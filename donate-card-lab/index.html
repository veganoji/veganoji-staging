<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>支援カード — 金額セレクター（更新版）— Vegan Oji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#1F1812; --ink-soft:#3C2E22; --muted:#786148;
      --paper:#FFF9EE; --paper-soft:#FDF1DA;
      --royal:#C9223A; --royal-deep:#9C1428; --gold:#D4A847; --gold-soft:#E8C76F;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:"Noto Sans JP",sans-serif;color:var(--ink);background:#F4EAD6;-webkit-font-smoothing:antialiased;}
    .wrap{max-width:820px;margin:0 auto;padding:36px 18px 90px;}
    .head{text-align:center;margin-bottom:8px;}
    .eyebrow{font-size:13px;letter-spacing:.22em;font-weight:700;color:var(--royal-deep);}
    h1{font-size:25px;font-weight:900;margin:8px 0 0;}
    .note{max-width:640px;margin:13px auto 0;font-size:13.5px;line-height:1.85;color:var(--ink-soft);
      background:#FFFDF8;border:2px solid rgba(31,24,18,.12);border-radius:16px;padding:13px 18px;text-align:left;}
    .note b{color:var(--royal);}

    .band{margin-top:26px;background:var(--royal);border-radius:24px;padding:40px 22px;
      background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.05) 0 2px,transparent 2px 11px);}

    .dwidget{max-width:580px;margin:0 auto;background:var(--paper);border:2.5px solid var(--ink);
      border-radius:26px;box-shadow:6px 6px 0 rgba(31,24,18,.28);padding:26px 26px 24px;}
    .dw-title{text-align:center;font-size:21px;font-weight:900;color:var(--ink);margin-bottom:22px;}

    .dw-body{display:flex;align-items:center;gap:22px;}
    .dw-left{flex:1;min-width:0;}
    .dw-right{flex-shrink:0;}
    @keyframes dwBob{0%,100%{transform:translateY(0) rotate(-1.2deg);}50%{transform:translateY(-4px) rotate(1.2deg);}}
    .dw-right img{width:160px;height:auto;object-fit:contain;filter:drop-shadow(0 8px 16px rgba(31,24,18,.25));animation:dwBob 4.5s ease-in-out infinite;transform-origin:bottom center;}
    @media(prefers-reduced-motion:reduce){.dw-right img{animation:none;}}

    .dw-seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
    .dw-seg button{font-family:inherit;cursor:pointer;font-weight:900;font-size:14px;padding:12px 4px;
      border-radius:13px;border:2px solid var(--ink);background:#fff;color:var(--ink);transition:transform .12s,background .15s;}
    .dw-seg button:hover{transform:translateY(-1px);}
    .dw-seg button.on{background:var(--royal);color:#fff;}

    /* amount line — centered over the 支援する button, "/月" tight to the number */
    .dw-amt{display:flex;align-items:baseline;justify-content:center;gap:1px;margin-bottom:16px;color:var(--royal);}
    .dw-amt .yen{font-size:26px;font-weight:900;}
    .dw-amt .val{font-size:34px;font-weight:900;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
    .dw-amt .vin{width:108px;border:none;background:transparent;font-family:inherit;font-weight:900;font-size:34px;
      letter-spacing:-.02em;color:var(--royal);outline:none;padding:0 2px;border-bottom:2.5px solid var(--royal);
      font-variant-numeric:tabular-nums;}
    .dw-amt .vin::-webkit-outer-spin-button,.dw-amt .vin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .dw-amt .per{font-size:15px;font-weight:700;color:var(--muted);margin-left:2px;}

    .dw-btn{display:flex;align-items:center;justify-content:center;width:100%;cursor:pointer;
      font-family:inherit;font-weight:900;font-size:16px;text-decoration:none;border-radius:14px;
      background:var(--royal);color:#fff;border:2.5px solid var(--ink);box-shadow:3px 3px 0 var(--ink);padding:13px;
      transition:transform .14s,box-shadow .14s;}
    .dw-btn:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
    .dw-btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
    .dw-fine{text-align:center;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:11px;}

    @media(max-width:560px){
      .dw-body{flex-direction:column-reverse;gap:10px;}
      .dw-right img{width:128px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="eyebrow">VEGAN OJI · DONATE WIDGET</div>
      <h1>支援カード（金額セレクター・更新版）</h1>
      <p class="note">
        ¥3,000/月が初期選択。金額行は常に表示で <b>支援するボタンの上に中央寄せ</b>、ハート画像は削除（王子の画像で十分）。<br>
        ✅ 3つともStripe接続済み（実リンク）。<b>自由記入</b>はStripeの仕様上、¥100きざみの数量調整で金額を決めます（決済ページで変更可）。
      </p>
    </div>

    <div class="band">
      <div class="dwidget">
        <div class="dw-title">王子の活動を応援する</div>
        <div class="dw-body">
          <div class="dw-left">
            <div class="dw-seg">
              <button type="button" data-amt="1,000" data-link="https://buy.stripe.com/7sI03zbyj33T7WE144">¥1,000</button>
              <button type="button" data-amt="3,000" data-link="https://buy.stripe.com/eVq7sKa2maEH8tRaKvao80f" class="on">¥3,000</button>
              <button type="button" data-custom data-link="https://buy.stripe.com/28E28qb6qaEH25t3i3ao80g">自由記入</button>
            </div>
            <div class="dw-amt">
              <span class="yen">¥</span>
              <span class="val">3,000</span>
              <input class="vin" type="text" inputmode="numeric" placeholder="5,000" style="display:none" aria-label="毎月の支援金額">
              <span class="per">/月</span>
            </div>
            <a class="dw-btn" href="https://buy.stripe.com/eVq7sKa2maEH8tRaKvao80f" target="_blank" rel="noopener">支援する</a>
            <div class="dw-fine">いつでも変更・解除OK ・ Stripeの安全な決済ページへ</div>
          </div>
          <div class="dw-right">
            <img src="/images/mascot/treasure-chest.png" alt="ビーガン王子" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var seg = document.querySelectorAll('.dw-seg button');
      var val = document.querySelector('.dw-amt .val');
      var vin = document.querySelector('.dw-amt .vin');
      var btn = document.querySelector('.dw-btn');
      seg.forEach(function(b){
        b.addEventListener('click', function(){
          seg.forEach(function(x){ x.classList.remove('on'); });
          b.classList.add('on');
          btn.href = b.getAttribute('data-link');
          if (b.hasAttribute('data-custom')) {
            val.style.display = 'none';
            vin.style.display = 'inline-block';
            vin.value = '';
            vin.focus();
          } else {
            vin.style.display = 'none';
            val.style.display = 'inline';
            val.textContent = b.getAttribute('data-amt');
          }
        });
      });
    })();
  </script>
</body>
</html>
