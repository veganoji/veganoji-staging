<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>支援カード — 金額セレクター（更新版）— Vegan Oji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --ink:#1F1812; --ink-soft:#3C2E22; --muted:#786148;
      --paper:#FFF9EE; --paper-soft:#FDF1DA;
      --royal:#C9223A; --royal-deep:#9C1428; --gold:#D4A847; --gold-soft:#E8C76F;
    }
    *{box-sizing:border-box;}
    body{margin:0;font-family:"Noto Sans JP",sans-serif;color:var(--ink);background:#F4EAD6;-webkit-font-smoothing:antialiased;}
    .wrap{max-width:820px;margin:0 auto;padding:36px 18px 90px;}
    .head{text-align:center;margin-bottom:8px;}
    .eyebrow{font-size:13px;letter-spacing:.22em;font-weight:700;color:var(--royal-deep);}
    h1{font-size:25px;font-weight:900;margin:8px 0 0;}
    .note{max-width:640px;margin:13px auto 0;font-size:13.5px;line-height:1.85;color:var(--ink-soft);
      background:#FFFDF8;border:2px solid rgba(31,24,18,.12);border-radius:16px;padding:13px 18px;text-align:left;}
    .note b{color:var(--royal);}

    /* red donate band (mirrors live #donate) */
    .band{margin-top:26px;background:var(--royal);border-radius:24px;padding:40px 22px;
      background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.05) 0 2px,transparent 2px 11px);}

    .widget{max-width:580px;margin:0 auto;background:var(--paper);border:2.5px solid var(--ink);
      border-radius:26px;box-shadow:6px 6px 0 rgba(31,24,18,.28);padding:26px 26px 24px;}

    /* heart + title (title on its own line) */
    .wtop{text-align:center;margin-bottom:22px;}
    .wtop .heart{width:40px;height:40px;object-fit:contain;display:block;margin:0 auto 6px;}
    .wtop .wtitle{font-size:21px;font-weight:900;color:var(--ink);}

    /* body: amount controls on the LEFT, oji-with-golden-hearts on the RIGHT */
    .wbody{display:flex;align-items:center;gap:22px;}
    .wleft{flex:1;min-width:0;}
    .wright{flex-shrink:0;}
    .wright img{width:160px;height:auto;object-fit:contain;filter:drop-shadow(0 8px 16px rgba(31,24,18,.25));}

    .seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
    .seg button{font-family:inherit;cursor:pointer;font-weight:900;font-size:14px;padding:12px 4px;
      border-radius:13px;border:2px solid var(--ink);background:#fff;color:var(--ink);transition:transform .12s,background .15s;}
    .seg button:hover{transform:translateY(-1px);}
    .seg button.on{background:var(--royal);color:#fff;}

    /* always-visible amount line: ¥ [value] / 月 — read-only for presets, editable for 自由記入 */
    .amt-line{display:flex;align-items:baseline;gap:4px;margin-bottom:18px;color:var(--royal);}
    .amt-line .yen{font-size:26px;font-weight:900;}
    .amt-line .amt-val{width:130px;border:none;background:transparent;font-family:inherit;font-weight:900;
      font-size:34px;letter-spacing:-.02em;color:var(--royal);outline:none;padding:0;
      font-variant-numeric:tabular-nums;}
    .amt-line .amt-val:read-only{cursor:default;}
    .amt-line .amt-val:not(:read-only){border-bottom:2.5px solid var(--royal);}
    .amt-line .amt-val::-webkit-outer-spin-button,.amt-line .amt-val::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .amt-line .per{font-size:15px;font-weight:700;color:var(--muted);}

    .donate-btn{display:flex;align-items:center;justify-content:center;width:100%;cursor:pointer;
      font-family:inherit;font-weight:900;font-size:16px;text-decoration:none;border-radius:14px;
      background:var(--royal);color:#fff;border:2.5px solid var(--ink);box-shadow:3px 3px 0 var(--ink);padding:13px;
      transition:transform .14s,box-shadow .14s;}
    .donate-btn:hover{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink);}
    .donate-btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink);}
    .fineprint{text-align:center;font-size:11.5px;color:var(--muted);font-weight:600;margin-top:11px;}

    @media(max-width:560px){
      .wbody{flex-direction:column-reverse;gap:10px;}
      .wright img{width:128px;}
      .amt-line{justify-content:center;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="eyebrow">VEGAN OJI · DONATE WIDGET</div>
      <h1>支援カード（金額セレクター・更新版）</h1>
      <p class="note">
        V3ベースの更新版。<b>¥3,000/月が初期選択</b>、金額行は常に表示（プリセットは固定表示、<b>自由記入</b>のときだけ入力可）。
        金額は左・<b>王子と金のハート</b>の画像は右。<br>
        気に入ったらこのままホームページ <b>#donate</b> に入れて、3つともStripeに接続します。
      </p>
    </div>

    <div class="band">
      <div class="widget">
        <div class="wtop">
          <img class="heart" src="/images/vegan-to-chikyu/icon-heart.png" alt="">
          <div class="wtitle">王子の活動を応援する</div>
        </div>
        <div class="wbody">
          <div class="wleft">
            <div class="seg">
              <button type="button" data-amt="1,000">¥1,000</button>
              <button type="button" data-amt="3,000" class="on">¥3,000</button>
              <button type="button" data-custom>自由記入</button>
            </div>
            <div class="amt-line">
              <span class="yen">¥</span>
              <input class="amt-val" type="text" inputmode="numeric" value="3,000" readonly aria-label="毎月の支援金額">
              <span class="per">/ 月</span>
            </div>
            <a class="donate-btn" href="#">支援する</a>
            <div class="fineprint">いつでも変更・解除OK ・ Stripeの安全な決済ページへ</div>
          </div>
          <div class="wright">
            <img src="/images/mascot/treasure-chest.png" alt="ビーガン王子" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      var seg = document.querySelectorAll('.seg button');
      var amt = document.querySelector('.amt-val');
      seg.forEach(function(b){
        b.addEventListener('click', function(){
          seg.forEach(function(x){ x.classList.remove('on'); });
          b.classList.add('on');
          if (b.hasAttribute('data-custom')) {
            amt.readOnly = false;
            amt.value = '';
            amt.placeholder = '5,000';
            amt.focus();
          } else {
            amt.readOnly = true;
            amt.value = b.getAttribute('data-amt'); // "1,000" or "3,000"
          }
        });
      });
    })();
  </script>
</body>
</html>
