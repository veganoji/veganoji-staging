<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>結果発表 — recap flip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    .__seed { color: inherit; }
    @theme {
      --color-paper: #FFF9EE; --color-paper-soft: #FDF1DA;
      --color-ink: #1F1812; --color-ink-soft: #3C2E22; --color-muted: #786148;
      --color-royal: #C9223A; --color-royal-deep: #9C1428; --color-gold: #D4A847; --color-gold-deep: #9C7E2A;
      --color-leaf: #6C9560; --color-leaf-deep: #3F6A3A;
      --font-noto-sans-jp: "Noto Sans JP", sans-serif;
    }
    html, body { background: var(--color-paper); color: var(--color-ink); }
    body { font-family: var(--font-noto-sans-jp); font-feature-settings: "palt"; -webkit-font-smoothing: antialiased; }
    .font-jp-display { font-weight: 900; }
    .pill { display:inline-block; font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px; border:2px solid var(--color-ink); background:var(--color-paper); }

    /* gentle idle animations */
    @keyframes softbob { 0%,100%{ transform: translateY(0) rotate(-1.5deg);} 50%{ transform: translateY(-6px) rotate(1.5deg);} }
    .anim-bob { animation: softbob 3.2s ease-in-out infinite; }
    @keyframes softpulse { 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.07);} }
    .anim-pulse { animation: softpulse 2.6s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce){ .anim-bob,.anim-pulse{ animation:none !important; } }

    /* recap row: BIG uncolored Q-number outside the card (left), vertically centered */
    .row { display: flex; align-items: center; gap: 9px; }
    .qnum { flex-shrink: 0; width: 44px; font-weight: 800; font-size: 23px; color: var(--color-ink); text-align: right; letter-spacing: -0.02em; }
    .flipwrap { flex: 1; perspective: 1100px; }
    .card {
      position: relative; width: 100%;
      background: var(--color-paper); border: 2.5px solid var(--color-ink);
      border-radius: 16px; box-shadow: 4px 4px 0 var(--color-ink);
      padding: 14px 16px; cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.18s ease;
    }
    .card:hover { box-shadow: 2px 2px 0 var(--color-ink); }
    .card.is-correct { background: #F3FAF0; }
    .card.is-wrong   { background: #FDF3F3; }
    /* flip indicator (top-right) — replaces the "タップで答え" line */
    .flip-ic { position: absolute; top: 9px; right: 11px; color: var(--color-muted); opacity: 0.6; pointer-events: none; }

    .front { display: flex; align-items: center; gap: 14px; padding-right: 18px; }
    .result-ic { width: 54px; height: 54px; flex-shrink: 0; }
    @media (min-width:640px){ .result-ic { width: 62px; height: 62px; } }
    .q-text { font-weight: 700; font-size: 16.5px; line-height: 1.5; color: var(--color-ink); }
    @media (min-width:640px){ .q-text { font-size: 18px; } }

    /* back: answers LEFT, compact button RIGHT (beside, not below) → shorter card */
    .back { display: flex; align-items: center; gap: 11px; }
    .back-ans { flex: 1 1 auto; min-width: 0; }
    .ans-line { font-size: 14.5px; line-height: 1.5; font-weight: 700; }
    @media (min-width:640px){ .ans-line { font-size: 16px; } }
    .ans-label { font-size: 11px; font-weight: 700; color: var(--color-muted); margin-right: 5px; }
    .ans-you-wrong { color: var(--color-royal-deep); }
    .ans-ok { color: var(--color-leaf-deep); }
    .more {
      flex-shrink: 0; display:inline-flex; align-items:center; gap:5px;
      font-size:12.5px; font-weight:700; color:#fff; background:var(--color-leaf);
      border:2px solid var(--color-ink); border-radius:10px; box-shadow:3px 3px 0 var(--color-ink);
      padding:8px 12px; text-decoration:none; white-space:nowrap;
    }
    .more:hover { background: var(--color-leaf-deep); }
  </style>
</head>
<body class="antialiased">
  <div class="max-w-xl mx-auto px-5 sm:px-7 py-10 sm:py-14">

    <header class="mb-7">
      <div class="pill mb-4">recap · flip(横軸) · noindex</div>
      <p class="font-jp text-ink-soft text-[13.5px] leading-[1.8] bg-paper-soft border-2 border-ink/15 rounded-xl px-4 py-3">
        改良版：横軸でめくる／答えは左・ボタンは右でカードを低く／Qタグ大きめ・縦中央／「タップで答え」は消して右上にめくりアイコン／バッジとアイコンを軽くアニメ。
      </p>
    </header>

    <!-- badge + 結果発表 + score -->
    <div class="text-center mb-9">
      <img id="badge" src="/images/quiz-bg/badge.png" alt="ビーガン王子認定" class="w-36 sm:w-44 mx-auto mb-2 anim-bob drop-shadow-[0_6px_14px_rgba(31,24,18,0.15)]" onerror="this.style.display='none'"/>
      <div class="font-jp-display text-[15px] tracking-[0.14em]" style="color:var(--color-gold-deep);">結果発表</div>
      <div class="font-jp-display leading-none mt-1">
        <span style="font-size:66px; color:var(--color-royal);">7</span><span class="text-ink/55" style="font-size:30px;"> / 10</span>
      </div>
    </div>

    <div id="list" class="flex flex-col gap-3"></div>
  </div>

  <script>
    // sample data — full question, NO furigana. 7/10 (Q2/Q5/Q9 wrong)
    const Q = [
      { n:1, ok:true,  q:'牛のゲップに含まれるメタン。温室効果はCO₂の約何倍？', you:'約28倍', ans:'約28倍', href:'/vegan-and-earth/#ch1' },
      { n:2, ok:false, q:'ハンバーガー1個を作るのに必要なお水は？', you:'約300L', ans:'約3,000L', href:'/vegan-and-earth/#ch2' },
      { n:3, ok:true,  q:'世界の畜産が"1秒"で出すフンの量は？', you:'約40,000kg', ans:'約40,000kg', href:'/vegan-and-earth/#ch3' },
      { n:4, ok:true,  q:'アマゾンの森が切られる、いちばん大きな理由は？', you:'家畜の農地拡張', ans:'家畜の農地拡張', href:'/vegan-and-earth/#ch3' },
      { n:5, ok:false, q:'地球の"陸地"の何%が、畜産に使われている？', you:'約10%', ans:'約30%', href:'/vegan-and-earth/#ch3' },
      { n:6, ok:true,  q:'農地の8割が畜産用。では、そこから得られるカロリーは全体の何%？', you:'約2割', ans:'約2割', href:'/vegan-and-earth/#ch3' },
      { n:7, ok:true,  q:'同じ広さの土地で、牛肉と植物性食品。作れる食べ物の量の差は約何倍？', you:'約100倍', ans:'約100倍', href:'/vegan-and-earth/#ch3' },
      { n:8, ok:true,  q:'世界で1年間に獲られる魚は、およそ何匹？', you:'約2,000,000,000,000匹', ans:'約2,000,000,000,000匹', href:'/fish-and-life/' },
      { n:9, ok:false, q:'漁で獲られた生きもののうち、"食べるためですらない"のは約どれくらい？', you:'約1割', ans:'約4割', href:'/fish-and-life/' },
      { n:10,ok:true,  q:'家畜のエサに回されている食料は、何人分？', you:'約10,000,000,000人分', ans:'約10,000,000,000人分', href:'/vegan-and-earth/#ch4' },
    ];
    const ARROW = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7 L11 7 M7 3 L11 7 L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>';
    // little "flip me" indicator (rotating arrows)
    const FLIP = '<svg class="flip-ic" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const CHECK = 'https://veganoji.jp/images/vegan-to-chikyu/icon-check-social.png';
    const XMARK = 'https://veganoji.jp/images/vegan-to-chikyu/icon-x-social.png';

    document.getElementById('list').innerHTML = Q.map(o => {
      const front =
        '<div class="front">' + FLIP +
          '<img class="result-ic anim-pulse" src="' + (o.ok ? CHECK : XMARK) + '" alt="' + (o.ok?'正解':'不正解') + '"/>' +
          '<p class="q-text">' + o.q + '</p>' +
        '</div>';
      const youLine = o.ok ? ''
        : '<div class="ans-line"><span class="ans-label">きみの答え</span><span class="ans-you-wrong">' + o.you + '</span></div>';
      const back =
        '<div class="back" style="display:none">' +
          '<div class="back-ans">' +
            youLine +
            '<div class="ans-line"><span class="ans-label">正解</span><span class="ans-ok">' + o.ans + '</span></div>' +
          '</div>' +
          '<a class="more" href="' + o.href + '" onclick="event.stopPropagation()">くわしく見る ' + ARROW + '</a>' +
        '</div>';
      return '<div class="row">' +
          '<div class="qnum">Q' + o.n + '</div>' +
          '<div class="flipwrap"><div class="card ' + (o.ok?'is-correct':'is-wrong') + '" data-card>' + front + back + '</div></div>' +
        '</div>';
    }).join('');

    // flip on the HORIZONTAL axis (rotateX): edge-on, swap, rotate back
    document.querySelectorAll('[data-card]').forEach(card => {
      card.addEventListener('click', () => {
        const front = card.querySelector('.front');
        const back = card.querySelector('.back');
        card.style.transform = 'rotateX(90deg)';
        setTimeout(() => {
          const showBack = front.style.display !== 'none';
          front.style.display = showBack ? 'none' : '';
          back.style.display = showBack ? '' : 'none';
          card.style.transform = 'rotateX(0deg)';
        }, 210);
      });
    });
  </script>
</body>
</html>
