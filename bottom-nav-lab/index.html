<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ページ下ナビ — ライブプレビュー — Vegan Oji</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    body{margin:0;font-family:"Noto Sans JP",sans-serif;color:#1F1812;
      background:radial-gradient(ellipse at 12% 0%,rgba(108,149,96,.12),transparent 45%),#F4EAD6;
      -webkit-font-smoothing:antialiased;}
    .wrap{max-width:480px;margin:0 auto;padding:40px 18px 100px;}
    .note{font-size:13.5px;line-height:1.8;color:#3C2E22;background:#FFFDF8;
      border:2px solid rgba(31,24,18,.12);border-radius:16px;padding:13px 18px;margin-bottom:26px;text-align:left;}
    .note b{color:#C9223A;}
    .note code{background:#F1E7D2;padding:1px 6px;border-radius:6px;font-size:12.5px;}
  </style>
</head>
<body>
  <div class="wrap">
    <p class="note">
      これは共通フッターカード <b><code>/oji-footer.js</code></b> の<b>ライブプレビュー</b>です。<br>
      このファイルを1か所編集すれば、読み込んでいる<b>全ページ</b>のカードが同時に更新されます。
    </p>
    <!-- The shared component renders itself into this div -->
    <div id="oji-footer-nav"></div>
  </div>
  <script src="/oji-footer.js" defer></script>
</body>
</html>
