  <style type="text/tailwindcss">
    .__seed { color: inherit; }

    @theme {
      --color-paper:       #FFF9EE;
      --color-paper-soft:  #FDF1DA;
      --color-paper-dim:   #F6E4BD;
      --color-ink:         #1F1812;
      --color-ink-soft:    #3C2E22;
      --color-muted:       #786148;
      --color-line:        #E9D9B5;
      --color-royal:       #C9223A;
      --color-royal-deep:  #9C1428;
      --color-gold:        #D4A847;
      --color-gold-soft:   #E8C76F;
      --color-gold-deep:   #9C7E2A;
      --color-leaf:        #6C9560;
      --color-leaf-deep:   #3F6A3A;
      --color-sky:         #2B7AB0;
      --color-blush-deep:  #B8456A;
      --font-noto-sans-jp: "Noto Sans JP", sans-serif;
    }

    html, body { background: var(--color-paper); color: var(--color-ink); }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-noto-sans-jp);
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .anim-bobble, .anim-float { animation: none !important; }
    }

    .font-jp-display { font-family: var(--font-noto-sans-jp); font-weight: 900; }
    .font-jp         { font-family: var(--font-noto-sans-jp); }
    .display-tight   { letter-spacing: -0.035em; line-height: 0.94; }

    button, [class*="btn-"] { font-family: var(--font-noto-sans-jp) !important; font-weight: 700 !important; }
    .btn-base {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 22px; border-radius: 16px;
      border: 2.5px solid var(--color-ink); box-shadow: 4px 4px 0 var(--color-ink);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      font-size: 15px; line-height: 1; white-space: nowrap; cursor: pointer;
    }
    .btn-base:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--color-ink); }
    .btn-base:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--color-ink); }
    .btn-leaf  { background: var(--color-leaf); color: var(--color-paper); }
    .btn-leaf:hover { background: var(--color-leaf-deep); }
    .btn-ghost { background: var(--color-paper); color: var(--color-ink); }

    /* Reveal — visible by default; JS hides+animates only off-screen items (robust to hidden tabs). */
    .reveal { opacity: 1; }
    .reveal.pre { opacity: 0; }
    .reveal.in { animation: fadeUp 0.7s ease-out both; }
    .reveal.in[data-delay="1"] { animation-delay: 0.08s; }
    .reveal.in[data-delay="2"] { animation-delay: 0.16s; }
    .reveal.in[data-delay="3"] { animation-delay: 0.24s; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .reveal, .reveal.pre { opacity: 1 !important; animation: none !important; } }

    @keyframes bobble { 0%,100%{ transform:translateY(0) rotate(-1.5deg);} 50%{ transform:translateY(-10px) rotate(1.5deg);} }
    .anim-bobble { animation: bobble 5s ease-in-out infinite; }
    @keyframes floaty { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-6px);} }
    .anim-float { animation: floaty 4s ease-in-out infinite; }

    /* ════════ Hero with custom watercolor background ════════
       To switch backgrounds, change the bg-N.jpg filename below (options in /recipes/bg-lab/). */
    .recipe-hero {
      background-size: cover; background-position: center;
      min-height: clamp(470px, 72vh, 680px);
      display: flex; align-items: flex-end; justify-content: center;
      padding: 70px 24px 28px;
    }
    @media (min-width: 640px) { .recipe-hero { padding: 90px 40px 54px; } }
    .recipe-hero__inner { max-width: 640px; text-align: center; }

    /* ════════ Section shelves (horizontal scrollers) ════════ */
    .shelf { margin: 0 0 30px; }
    .shelf__head { display: flex; align-items: center; gap: 10px; margin: 0 0 13px; padding: 0 1px; }
    .shelf__badge { width: 32px; height: 32px; border-radius: 10px; border: 2.5px solid var(--color-ink);
      box-shadow: 2px 2px 0 var(--color-ink); display: inline-flex; align-items: center; justify-content: center;
      font-size: 17px; line-height: 1; flex-shrink: 0; }
    .shelf__ico { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0;
      filter: drop-shadow(0 2px 3px rgba(31,24,18,0.12)); }
    .shelf__title { font-family: var(--font-noto-sans-jp); font-weight: 900; font-size: 21px; color: var(--color-ink); }
    .scroller { display: flex; gap: 16px; overflow-x: auto; overflow-y: hidden;
      padding: 4px 2px 16px; scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; -ms-overflow-style: none; }
    .scroller::-webkit-scrollbar { display: none; }
    .scroller .rcard { flex: 0 0 268px; scroll-snap-align: start; }
    @media (max-width: 480px) { .scroller .rcard { flex: 0 0 82vw; max-width: 320px; } }
    .ticon { width: 14px; height: 14px; object-fit: contain; vertical-align: -2px; }

    .rcard {
      display: flex; flex-direction: column; overflow: hidden;
      background: var(--color-paper); border: 2.5px solid var(--color-ink);
      border-radius: 22px; box-shadow: 6px 6px 0 var(--color-ink);
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .rcard:hover { transform: translateY(-4px); box-shadow: 8px 11px 0 var(--color-ink); }
    .rcard__imgwrap { position: relative; aspect-ratio: 4 / 3; overflow: hidden;
      border-bottom: 2.5px solid var(--color-ink); background: var(--color-paper-dim); }
    .rcard__img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .rcard__tag {
      position: absolute; top: 11px; left: 11px;
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 900; color: #fff;
      border: 2px solid var(--color-ink); border-radius: 999px;
      box-shadow: 2px 2px 0 var(--color-ink); padding: 4px 11px 4px 9px;
    }
    .rcard__time {
      position: absolute; bottom: 11px; right: 11px;
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 800; color: var(--color-ink);
      background: rgba(255,249,238,0.94); border: 2px solid var(--color-ink);
      border-radius: 999px; box-shadow: 2px 2px 0 var(--color-ink); padding: 3px 10px;
    }
    .rcard__body { display: flex; flex-direction: column; flex: 1; padding: 15px 16px 16px; }
    .rcard__title { font-family: var(--font-noto-sans-jp); font-weight: 900; font-size: 20px; line-height: 1.35; color: var(--color-ink); }
    .rcard__meta { margin-top: 6px; font-size: 12.5px; font-weight: 700; color: var(--color-muted); display: flex; align-items: center; gap: 12px; }
    .rcard__tip {
      margin-top: 12px; display: flex; align-items: flex-start; gap: 9px;
      background: var(--color-paper-soft); border: 2px solid rgba(31,24,18,0.14);
      border-radius: 14px; padding: 9px 11px;
    }
    .rcard__tip img.oji { width: 34px; height: 34px; flex-shrink: 0; object-fit: contain; filter: drop-shadow(0 3px 5px rgba(31,24,18,0.14)); }
    .rcard__tip p { font-size: 13px; line-height: 1.7; color: var(--color-ink-soft); margin: 0;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .rcard__actions { margin-top: auto; padding-top: 14px; display: flex; gap: 9px; }
    .rcard__actions .b {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      font-family: var(--font-noto-sans-jp); font-weight: 700; font-size: 13.5px;
      border: 2.5px solid var(--color-ink); border-radius: 13px; box-shadow: 3px 3px 0 var(--color-ink);
      padding: 10px 8px; cursor: pointer; transition: transform .15s ease, box-shadow .15s ease, background .2s ease;
    }
    .rcard__actions .b:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--color-ink); }
    .rcard__actions .b-view { background: var(--color-leaf); color: var(--color-paper); }
    .rcard__actions .b-view:hover { background: var(--color-leaf-deep); }
    .rcard__actions .b-save { background: var(--color-paper); color: var(--color-ink); }
    .rcard__actions .b-save:hover { background: var(--color-gold-soft); }

    .empty { text-align: center; padding: 50px 20px; }
    .empty img { width: 120px; margin: 0 auto 14px; }

    /* ════════ Detail modal ════════ */
    .modal { position: fixed; inset: 0; z-index: 70; display: none;
      align-items: flex-start; justify-content: center; padding: 18px;
      background: rgba(31,24,18,0.55); -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px); overflow-y: auto; }
    .modal.is-open { display: flex; }
    .modal__panel {
      position: relative; width: 100%; max-width: 560px; margin: 24px 0 40px;
      background: var(--color-paper); border: 3px solid var(--color-ink);
      border-radius: 26px; box-shadow: 8px 8px 0 var(--color-ink); overflow: hidden;
      animation: modalpop .32s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes modalpop { from{ opacity:0; transform: translateY(16px) scale(0.98);} to{ opacity:1; transform:none;} }
    @media (prefers-reduced-motion: reduce){ .modal__panel{ animation:none; } }
    .modal__hero { position: relative; aspect-ratio: 16 / 10; overflow: hidden; border-bottom: 3px solid var(--color-ink); background: var(--color-paper-dim); }
    .modal__hero img { width: 100%; height: 100%; object-fit: cover; }
    .modal__x {
      position: absolute; top: 12px; right: 12px; width: 40px; height: 40px;
      border-radius: 12px; border: 2.5px solid var(--color-ink); background: rgba(255,249,238,0.95);
      box-shadow: 3px 3px 0 var(--color-ink); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
    .modal__x:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--color-ink); }
    .modal__tag { position: absolute; top: 12px; left: 12px;
      display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 900; color: #fff;
      border: 2px solid var(--color-ink); border-radius: 999px; box-shadow: 2px 2px 0 var(--color-ink); padding: 5px 12px 5px 10px; }
    .modal__body { padding: 20px 20px 26px; }
    .modal__title { font-family: var(--font-noto-sans-jp); font-weight: 900; font-size: 25px; line-height: 1.4; color: var(--color-ink); }
    .modal__meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 8px; }
    .modal__meta .m { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700;
      color: var(--color-ink-soft); background: var(--color-paper-soft);
      border: 2px solid rgba(31,24,18,0.14); border-radius: 999px; padding: 5px 12px; }

    .sec-h { display: flex; align-items: center; gap: 9px; margin: 24px 0 12px;
      font-family: var(--font-noto-sans-jp); font-weight: 900; font-size: 18px; color: var(--color-ink); }
    .sec-h img.sec-ico { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; }
    .sec-h .serv { font-size: 13px; font-weight: 700; color: var(--color-muted); }

    .ing-list .row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
      padding: 9px 2px; border-bottom: 1px dotted rgba(31,24,18,0.22); font-size: 14.5px; }
    .ing-list .row:last-child { border-bottom: none; }
    .ing-list .it { font-weight: 700; color: var(--color-ink); }
    .ing-list .am { font-weight: 700; color: var(--color-leaf-deep); white-space: nowrap; flex-shrink: 0; }

    .step-list { display: flex; flex-direction: column; gap: 12px; counter-reset: step; }
    .step-list .step { display: flex; gap: 12px; }
    .step-list .n { counter-increment: step; flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-leaf); color: #fff; border: 2px solid var(--color-ink); box-shadow: 2px 2px 0 var(--color-ink);
      display: inline-flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
    .step-list .n::before { content: counter(step); }
    .step-list .tx { font-size: 14.5px; line-height: 1.85; color: var(--color-ink-soft); padding-top: 2px; }

    /* Oji tips — larger, friendlier text per request */
    .otip-box { margin-top: 22px; display: flex; gap: 13px; align-items: flex-start;
      background: var(--color-paper-soft); border: 2.5px solid var(--color-ink); border-radius: 18px;
      box-shadow: 4px 4px 0 var(--color-ink); padding: 15px 16px; }
    .otip-box img.oji { width: 60px; flex-shrink: 0; object-fit: contain; filter: drop-shadow(0 4px 7px rgba(31,24,18,0.16)); }
    .otip-box .lab { font-size: 13px; font-weight: 900; letter-spacing: 0.06em; color: var(--color-gold-deep); display: flex; align-items: center; gap: 6px; }
    .otip-box .lab img { width: 20px; height: 20px; object-fit: contain; }
    .otip-box ul { margin: 8px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 9px; }
    .otip-box li { font-size: 15px; line-height: 1.85; color: var(--color-ink); display: flex; gap: 7px; align-items: flex-start; }
    .otip-box li img.sprout { width: 18px; height: 18px; flex-shrink: 0; margin-top: 4px; object-fit: contain; }

    .src-credit { margin-top: 20px; font-size: 12.5px; line-height: 1.7; color: var(--color-muted);
      background: var(--color-paper-soft); border: 2px dashed rgba(31,24,18,0.22); border-radius: 14px; padding: 11px 13px; }
    .src-credit a { color: var(--color-ink-soft); font-weight: 700; text-decoration: underline; text-underline-offset: 2px; }
    .src-credit a:hover { color: var(--color-royal); }

    .modal__cta { margin-top: 22px; display: flex; flex-wrap: wrap; gap: 10px; }
    .modal__cta .grow { flex: 1 1 auto; }
    .modal__cta .btn-primary { background: var(--color-royal); color: var(--color-paper); }
    .modal__cta .btn-primary:hover { background: var(--color-royal-deep); }
    .share-mini { display: inline-flex; align-items: center; justify-content: center; width: 50px;
      border: 2.5px solid var(--color-ink); border-radius: 13px; box-shadow: 3px 3px 0 var(--color-ink);
      background: var(--color-paper); cursor: pointer; text-decoration: none; }
    .share-mini:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--color-ink); }
    .share-mini img { width: 22px; height: 22px; object-fit: contain; }

    .toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
      background: var(--color-ink); color: var(--color-paper); font-weight: 700; font-size: 14px;
      padding: 11px 20px; border-radius: 999px; box-shadow: 4px 4px 0 rgba(31,24,18,0.3);
      opacity: 0; pointer-events: none; transition: opacity .3s ease; z-index: 90; }

    /* The export "save image" card is drawn directly on a <canvas> in JS
       (drawExportCard) for pixel-perfect text — no DOM template / CSS needed. */
  </style>

</head>

      <div class="modal__hero">

        <div id="modal-meta" class="modal__meta"></div>

        <div class="sec-h"><img class="sec-ico" src="/images/recipes/icon-zairyo.png" alt="" onerror="this.style.display='none';"/>材料 <span id="modal-serv" class="serv"></span></div>

          <img class="oji" id="modal-tip-oji" src="/images/oji/oji_explaining.png" alt="ビーガン王子" onerror="this.src='/images/oji/oji_happy.png'"/>
          <div style="flex:1;min-width:0;">
            <div class="lab"><img src="/images/recipes/icon-sprout.png" alt="" onerror="this.style.display='none';"/>王子のひとこと</div>
            <ul id="modal-tip-list"></ul>
          </div>
        </div>

        <div id="modal-src" class="src-credit"></div>

        <div class="modal__cta">
          <button id="modal-save" type="button" class="btn-base btn-primary grow">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1.5 V10 M4 6.5 L7.5 10 L11 6.5 M2.5 12.5 H12.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            画像で保存
          </button>
          <a id="modal-x-share" class="share-mini" target="_blank" rel="noopener" aria-label="Xでシェア"><img src="/images/social/x.png" alt="X"/></a>
          <a id="modal-line-share" class="share-mini" target="_blank" rel="noopener" aria-label="LINEでシェア"><img src="/images/social/line.png" alt="LINE"/></a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- ═══════════════ SCRIPT ═══════════════ -->
  <script>
    (function () {
      'use strict';
      const PAGE_URL = 'https://veganoji.jp/recipes/';

      const CATS = {
        shusai:    { jp: '主菜',     em: '🍛', color: '#C9223A' },
        fukusai:   { jp: '副菜',     em: '🥗', color: '#6C9560' },
        shirumono: { jp: '汁物',     em: '🍲', color: '#2B7AB0' },
        gohanmen:  { jp: 'ごはん・麺', em: '🍚', color: '#9C7E2A' },
        sweets:    { jp: 'スイーツ',  em: '🍡', color: '#B8456A' },
      };
      const CAT_ORDER = ['shusai', 'fukusai', 'shirumono', 'gohanmen', 'sweets'];
      const OJI = ['oji_happy', 'oji_excited', 'oji_pointing_up', 'oji_teaching', 'oji_idea', 'oji_presenting', 'oji_winking', 'oji_explaining', 'oji_curious', 'oji_thinking'];

      const state = { recipes: [], filter: 'all' };
      const $ = (id) => document.getElementById(id);

      async function loadRecipes() {
        try {
          // TODO(supabase): swap for the Supabase REST read, e.g.
          //   fetch(`${SUPABASE_URL}/rest/v1/recipes?published=eq.true&order=id`, { headers: { apikey: ANON_KEY } })
          const res = await fetch('./recipes.json', { cache: 'no-cache' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          state.recipes = data.filter(r => r.published).sort((a, b) => a.id - b.id);
          renderShelves();
        } catch (e) {
          $('shelves').innerHTML = '<div class="empty"><img src="/images/oji/oji_worried.png" alt=""/>' +
            '<p class="font-jp text-ink-soft">レシピを読みこめませんでした。<br>少し時間をおいてね。</p></div>';
          console.error('loadRecipes failed:', e);
        }
      }

      function presentCats() {
        const set = new Set(state.recipes.map(r => r.category));
        return CAT_ORDER.filter(c => set.has(c));
      }
      // Section shelves: おすすめ (featured, or first 8 as fallback) then each present category.
      // おすすめ leads with a non-主菜 dish so it doesn't visually repeat the first 主菜 card.
      const RECO_ORDER = ['veg-curry', 'koya-karaage', 'napolitan', 'nikujaga', 'mapo-tofu', 'tofu-hamburg', 'veg-gyoza', 'mitarashi-dango'];
      const SECTIONS = [{ key: 'reco', name: 'おすすめ', icon: '/images/recipes/icon-sec-osusume.png' }]
        .concat(CAT_ORDER.map(c => ({ key: c, name: CATS[c].jp, icon: `/images/recipes/icon-sec-${c}.png` })));
      function shelfRecipes(key) {
        if (key === 'reco') {
          const f = state.recipes.filter(r => r.featured);
          if (!f.length) return state.recipes.slice(0, 8);
          const rank = s => { const i = RECO_ORDER.indexOf(s); return i < 0 ? 99 : i; };
          return f.slice().sort((a, b) => rank(a.slug) - rank(b.slug));
        }
        return state.recipes.filter(r => r.category === key);
      }
      function cardHTML(r, i) {
        const c = CATS[r.category] || { jp: r.category, em: '🍽', color: '#786148' };
        const pose = OJI[i % OJI.length];
        const tip = (r.tips && r.tips[0]) ? r.tips[0] : '';
        return `<article class="rcard reveal" data-delay="${(i % 3) + 1}">
          <div class="rcard__imgwrap">
            <img class="rcard__img" src="${r.hero_image_url}" alt="${r.title_jp}" loading="lazy" onerror="this.style.opacity=0.35;this.alt='';"/>
            <span class="rcard__tag" style="background:${c.color};"><span>${c.em}</span>${c.jp}</span>
            <span class="rcard__time"><img class="ticon" src="/images/recipes/icon-timer.png" alt="" onerror="this.style.display='none'"/> ${r.time_min}<span style="font-size:10px;">分</span></span>
          </div>
          <div class="rcard__body">
            <h3 class="rcard__title">${r.title_jp}</h3>
            <div class="rcard__meta"><span>🍽 ${r.servings}</span><span>🧺 ${r.ingredients.length}<span style="font-weight:600;">品</span></span></div>
            <div class="rcard__tip"><img class="oji" src="/images/oji/${pose}.png" alt="" loading="lazy" onerror="this.style.display='none';"/><p>${tip}</p></div>
            <div class="rcard__actions">
              <button type="button" class="b b-view" data-slug="${r.slug}">作り方をみる</button>
              <button type="button" class="b b-save" data-slug="${r.slug}" aria-label="画像で保存">
                <svg width="14" height="14" viewBox="0 0 15 15" fill="none"><path d="M7.5 1.5 V10 M4 6.5 L7.5 10 L11 6.5 M2.5 12.5 H12.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
                保存
              </button>
            </div>
          </div>
        </article>`;
      }
      function renderShelves() {
        const host = $('shelves');
        let gi = 0;
        host.innerHTML = SECTIONS.map(sec => {
          const list = shelfRecipes(sec.key);
          if (!list.length) return '';
          const cards = list.map(r => cardHTML(r, gi++)).join('');
          return `<section class="shelf">` +
            `<div class="shelf__head"><img class="shelf__ico" src="${sec.icon}" alt="" onerror="this.style.display='none'"/><span class="shelf__title">${sec.name}</span></div>` +
            `<div class="scroller">${cards}</div>` +
          `</section>`;
        }).join('');
        host.querySelectorAll('.b-view').forEach(b => b.addEventListener('click', () => openModal(b.dataset.slug)));
        host.querySelectorAll('.b-save').forEach(b => b.addEventListener('click', () => exportCard(b.dataset.slug, b)));
        setupReveals(host);
      }

      function bySlug(slug) { return state.recipes.find(r => r.slug === slug); }
      let lastFocus = null;
      function openModal(slug) {
        const r = bySlug(slug); if (!r) return;
        const c = CATS[r.category] || { jp: r.category, em: '🍽', color: '#786148' };
        lastFocus = document.activeElement;
        $('modal-img').src = r.hero_image_url; $('modal-img').alt = r.title_jp;
        $('modal-tag').innerHTML = `<span>${c.em}</span>${c.jp}`; $('modal-tag').style.background = c.color;
        $('modal-title').textContent = r.title_jp;
        $('modal-meta').innerHTML =
          `<span class="m"><img class="ticon" src="/images/recipes/icon-timer.png" alt="" onerror="this.style.display='none'"/> ${r.time_min}分</span><span class="m">🍽 ${r.servings}</span>` +
          `<span class="m" style="color:${c.color};border-color:${c.color};">${c.em} ${c.jp}</span>`;
        $('modal-serv').textContent = '（' + r.servings + '）';
        $('modal-ing').innerHTML = r.ingredients.map(ing =>
          `<div class="row"><span class="it">${ing.item}</span><span class="am">${ing.amount}</span></div>`).join('');
        $('modal-steps').innerHTML = r.steps.map(s => `<div class="step"><span class="n"></span><span class="tx">${s}</span></div>`).join('');
        $('modal-tip-list').innerHTML = (r.tips || []).map(t =>
          `<li><img class="sprout" src="/images/recipes/icon-sprout.png" alt="" onerror="this.outerHTML='🌱';"/><span>${t}</span></li>`).join('');
        $('modal-src').innerHTML = r.source_url
          ? '参考にしたレシピ ／ Recipe inspired by：<br><a href="' + r.source_url + '" target="_blank" rel="noopener nofollow">' + r.source_name + ' ↗</a>'
          : '定番の和食をもとに、ビーガン向けに書き起こしました。';
        const shareTxt = `「${r.title_jp}」— ビーガン王子のかんたん植物性レシピ 🌱`;
        $('modal-x-share').href = 'https://x.com/intent/tweet?text=' + encodeURIComponent(shareTxt) + '&url=' + encodeURIComponent(PAGE_URL);
        $('modal-line-share').href = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(PAGE_URL) + '&text=' + encodeURIComponent(shareTxt);
        $('modal-save').onclick = () => exportCard(slug, $('modal-save'));
        $('modal').classList.add('is-open'); document.body.style.overflow = 'hidden';
        $('modal-x').focus();
      }
      function closeModal() {
        $('modal').classList.remove('is-open'); document.body.style.overflow = '';
        if (lastFocus && lastFocus.focus) lastFocus.focus();
      }
      $('modal-x').addEventListener('click', closeModal);
      $('modal').addEventListener('click', (e) => { if (e.target === $('modal')) closeModal(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && $('modal').classList.contains('is-open')) closeModal(); });

      // ───────── Export card — drawn directly on a <canvas> (pixel-perfect) ─────────
      // We deliberately do NOT use html2canvas. html2canvas re-implements CSS layout +
      // text rendering in JS, and its font metrics are approximations, so glyphs land a
      // few px off (the recurring "text out of its element"). Drawing with the Canvas 2D
      // API places every element at coordinates we compute, and textAlign/textBaseline
      // give exact centering. Deterministic and correct.
      const EXC = { INK: '#1F1812', INKSOFT: '#3C2E22', PAPER: '#FFF9EE', PAPERDIM: '#F6E4BD',
        MUTED: '#786148', LEAF: '#6C9560', LEAFDEEP: '#3F6A3A', GOLD: '#E8C76F' };
      function loadImg(src) { return new Promise(res => { const im = new Image(); im.onload = () => res(im); im.onerror = () => res(null); im.src = src; }); }
      function rrect(ctx, x, y, w, h, r) { r = Math.min(r, w / 2, h / 2); ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath(); }
      function drawCover(ctx, img, dx, dy, dw, dh) { const ir = img.width / img.height, dr = dw / dh; let sw, sh, sx, sy; if (ir > dr) { sh = img.height; sw = sh * dr; sx = (img.width - sw) / 2; sy = 0; } else { sw = img.width; sh = sw / dr; sx = 0; sy = (img.height - sh) / 2; } ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh); }
      function wrapJP(ctx, text, maxW) { const out = []; let line = ''; for (const ch of String(text)) { const t = line + ch; if (ctx.measureText(t).width > maxW && line) { out.push(line); line = ch; } else line = t; } if (line) out.push(line); return out; }
      function truncW(ctx, text, maxW) { if (ctx.measureText(text).width <= maxW) return text; let t = text; while (t.length && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1); return t + '…'; }

      async function drawExportCard(r) {
        const c = CATS[r.category] || { jp: r.category, em: '🍽', color: '#786148' };
        const pose = OJI[(r.id - 1) % OJI.length];
        if (document.fonts) { try { await Promise.all(['900', '800', '700', '600', '500'].map(w => document.fonts.load(w + ' 24px "Noto Sans JP"'))); await document.fonts.ready; } catch (_) {} }
        const [hero, oji, timer] = await Promise.all([loadImg(r.hero_image_url), loadImg('/images/oji/' + pose + '.png'), loadImg('/images/recipes/icon-timer.png')]);

        const W = 1080, PAD = 56, HERO_H = 520, FOOT_H = 104;
        const innerW = W - PAD * 2, GAP = 44;
        const ingW = Math.round(innerW * 0.43), stepW = innerW - ingW - GAP;
        const ingX = PAD, stepX = PAD + ingW + GAP;
        const m = document.createElement('canvas').getContext('2d');

        m.font = '900 56px "Noto Sans JP"';
        const titleLines = wrapJP(m, r.title_jp, innerW);
        const TITLE_TOP = HERO_H + 32, NT = titleLines.length;
        const subBaseline = TITLE_TOP + 50 + (NT - 1) * 64 + 46;

        const ingRowH = 44;
        const ingColH = 48 + r.ingredients.length * ingRowH;

        m.font = '500 27px "Noto Sans JP"';
        const stepLineH = 40, stepTextW = stepW - 52;
        let stepsBodyH = 0;
        const stepWrapped = r.steps.map(s => { const lines = wrapJP(m, s, stepTextW); stepsBodyH += Math.max(40, lines.length * stepLineH) + 16; return lines; });
        const stepsColH = 48 + stepsBodyH;

        const colsTop = subBaseline + 36;
        const srcTop = colsTop + Math.max(ingColH, stepsColH) + 16;
        const totalH = Math.max(1350, Math.round(srcTop + 40 + FOOT_H));

        const cv = document.createElement('canvas'); cv.width = W; cv.height = totalH;
        const ctx = cv.getContext('2d');

        ctx.fillStyle = EXC.PAPER; ctx.fillRect(0, 0, W, totalH);
        if (hero) drawCover(ctx, hero, 0, 0, W, HERO_H); else { ctx.fillStyle = EXC.PAPERDIM; ctx.fillRect(0, 0, W, HERO_H); }
        ctx.fillStyle = EXC.INK; ctx.fillRect(0, HERO_H - 7, W, 7);

        // tag pill
        ctx.font = '900 30px "Noto Sans JP"';
        const tagTxt = c.em + ' ' + c.jp, tagW = ctx.measureText(tagTxt).width + 44, tagH = 50;
        rrect(ctx, 34, 34, tagW, tagH, tagH / 2); ctx.fillStyle = c.color; ctx.fill(); ctx.lineWidth = 5; ctx.strokeStyle = EXC.INK; ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillText(tagTxt, 56, 34 + tagH / 2 + 1);

        // time pill
        ctx.font = '800 30px "Noto Sans JP"';
        const tTxt = r.time_min + '分', icoS = 30, tGap = 8;
        const timeW = (timer ? icoS + tGap : 0) + ctx.measureText(tTxt).width + 40, timeH = 50, timeX = W - 34 - timeW;
        rrect(ctx, timeX, 34, timeW, timeH, timeH / 2); ctx.fillStyle = 'rgba(255,249,238,0.96)'; ctx.fill(); ctx.lineWidth = 5; ctx.strokeStyle = EXC.INK; ctx.stroke();
        let tcx = timeX + 20;
        if (timer) { ctx.drawImage(timer, tcx, 34 + timeH / 2 - icoS / 2, icoS, icoS); tcx += icoS + tGap; }
        ctx.fillStyle = EXC.INK; ctx.textAlign = 'left'; ctx.textBaseline = 'middle'; ctx.fillText(tTxt, tcx, 34 + timeH / 2 + 1);

        // oji sticker
        if (oji) { const ow = 158, oh = ow * (oji.height / oji.width); ctx.drawImage(oji, 26, HERO_H - 7 - oh - 16, ow, oh); }

        // title + sub
        ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic'; ctx.fillStyle = EXC.INK; ctx.font = '900 56px "Noto Sans JP"';
        let ty = TITLE_TOP + 50;
        titleLines.forEach(l => { ctx.fillText(l, PAD, ty); ty += 64; });
        ctx.fillStyle = EXC.MUTED; ctx.font = '700 27px "Noto Sans JP"';
        ctx.fillText(r.servings + '　／　ビーガン(植物性100%)', PAD, subBaseline);

        // 材料 column
        ctx.fillStyle = c.color; rrect(ctx, ingX, colsTop + 6, 34, 8, 4); ctx.fill();
        ctx.fillStyle = EXC.INK; ctx.font = '900 31px "Noto Sans JP"'; ctx.fillText('材料', ingX + 44, colsTop + 26);
        let iy = colsTop + 48;
        r.ingredients.forEach(ing => {
          ctx.textAlign = 'right'; ctx.fillStyle = EXC.LEAFDEEP; ctx.font = '800 26px "Noto Sans JP"';
          const amW = ctx.measureText(ing.amount).width; ctx.fillText(ing.amount, ingX + ingW, iy + 27);
          ctx.textAlign = 'left'; ctx.fillStyle = EXC.INK; ctx.font = '700 26px "Noto Sans JP"';
          ctx.fillText(truncW(ctx, ing.item, ingW - amW - 16), ingX, iy + 27);
          ctx.strokeStyle = 'rgba(31,24,18,0.16)'; ctx.lineWidth = 1.5; ctx.setLineDash([2, 3]);
          ctx.beginPath(); ctx.moveTo(ingX, iy + ingRowH - 3); ctx.lineTo(ingX + ingW, iy + ingRowH - 3); ctx.stroke(); ctx.setLineDash([]);
          iy += ingRowH;
        });

        // 作り方 column
        ctx.fillStyle = EXC.LEAF; rrect(ctx, stepX, colsTop + 6, 34, 8, 4); ctx.fill();
        ctx.fillStyle = EXC.INK; ctx.font = '900 31px "Noto Sans JP"'; ctx.textAlign = 'left'; ctx.fillText('作り方', stepX + 44, colsTop + 26);
        let scy = colsTop + 48;
        stepWrapped.forEach((lines, i) => {
          const cd = 40, ccx = stepX + cd / 2, ccy = scy + cd / 2;
          ctx.beginPath(); ctx.arc(ccx, ccy, cd / 2, 0, Math.PI * 2); ctx.fillStyle = EXC.LEAF; ctx.fill();
          ctx.fillStyle = '#fff'; ctx.font = '900 23px "Noto Sans JP"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(String(i + 1), ccx, ccy + 1);
          ctx.fillStyle = EXC.INKSOFT; ctx.font = '500 27px "Noto Sans JP"'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
          let ly = scy + 28;
          lines.forEach(l => { ctx.fillText(l, stepX + cd + 12, ly); ly += stepLineH; });
          scy += Math.max(cd, lines.length * stepLineH) + 16;
        });

        // source
        ctx.fillStyle = EXC.MUTED; ctx.font = '500 23px "Noto Sans JP"'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
        ctx.fillText(truncW(ctx, r.source_name ? '参考：' + r.source_name : '定番の和食をビーガン向けにアレンジ', innerW), PAD, srcTop + 22);

        // footer bar
        const fy = totalH - FOOT_H;
        ctx.fillStyle = EXC.INK; ctx.fillRect(0, fy, W, FOOT_H);
        ctx.textBaseline = 'middle'; ctx.font = '700 30px "Noto Sans JP"';
        const f1 = '🌱 ビーガン王子のレシピ  ', f2 = 'veganoji.jp/recipes';
        const w1 = ctx.measureText(f1).width, fx = (W - (w1 + ctx.measureText(f2).width)) / 2;
        ctx.textAlign = 'left'; ctx.fillStyle = EXC.PAPER; ctx.fillText(f1, fx, fy + FOOT_H / 2 + 1);
        ctx.fillStyle = EXC.GOLD; ctx.fillText(f2, fx + w1, fy + FOOT_H / 2 + 1);

        // outer ink border
        ctx.strokeStyle = EXC.INK; ctx.lineWidth = 8; ctx.strokeRect(4, 4, W - 8, totalH - 8);
        return cv;
      }

      async function exportCard(slug, btn) {
        const r = bySlug(slug); if (!r) return;
        const label = btn ? btn.innerHTML : null;
        if (btn) { btn.disabled = true; btn.innerHTML = '生成中…'; }
        try {
          const canvas = await drawExportCard(r);
          const a = document.createElement('a');
          a.download = 'vegan-oji_' + slug + '.png';
          a.href = canvas.toDataURL('image/png');
          a.click();
          showToast('画像を保存したよ！🌱');
        } catch (e) { console.error('export failed', e); showToast('保存に失敗しちゃった…'); }
        finally { if (btn) { btn.disabled = false; btn.innerHTML = label; } }
      }

      let toastT;
      function showToast(msg) {
        const t = $('toast'); t.textContent = msg; t.style.opacity = '1';
        clearTimeout(toastT); toastT = setTimeout(() => { t.style.opacity = '0'; }, 2400);
      }

      // ───────── Reveal (additive animation; robust to hidden tabs) ─────────
      let io;
      function setupReveals(scope) {
        const els = [...(scope || document).querySelectorAll('.reveal')].filter(e => !e.dataset.rev);
        const canAnim = ('IntersectionObserver' in window) && !document.hidden;
        if (canAnim && !io) io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.remove('pre'); e.target.classList.add('in'); io.unobserve(e.target); } });
        }, { threshold: 0.12, rootMargin: '0px 0px -4% 0px' });
        els.forEach(el => {
          el.dataset.rev = '1';
          if (!canAnim) return;
          const belowFold = el.getBoundingClientRect().top > window.innerHeight * 0.9;
          if (belowFold) { el.classList.add('pre'); io.observe(el); }
          else { el.classList.add('in'); }
        });
      }
      function flushPre() { document.querySelectorAll('.reveal.pre').forEach(e => { e.classList.remove('pre'); e.classList.add('in'); }); }
      document.addEventListener('visibilitychange', () => { if (!document.hidden) flushPre(); });
      setTimeout(flushPre, 2500);

      setupReveals(document);
      loadRecipes();
      window.__recipes = state;
      window.__exportCard = exportCard;
      window.__drawExportCard = drawExportCard;
    })();
  </script>
  <script src="/mnav.js" defer></script>
</body>
</html>
