<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V5 夢の空 — ヒーロー背景案</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    .__seed { color: inherit; }
    @theme {
      --color-paper: #FFF9EE; --color-ink: #1F1812; --color-ink-soft: #3C2E22; --color-royal: #C9223A; --color-blush-deep: #B8456A;
      --font-noto-sans-jp: "Noto Sans JP", sans-serif;
    }
    html, body { background: #FCE9D8; color: var(--color-ink); }
    body { font-family: var(--font-noto-sans-jp); font-feature-settings: "palt"; -webkit-font-smoothing: antialiased; }
    .font-jp-display { font-weight: 900; } .display-tight { letter-spacing:-0.035em; line-height:0.94; }
    @keyframes bobble { 0%,100%{transform:translateY(0) rotate(-1deg);} 50%{transform:translateY(-12px) rotate(1deg);} }
    @keyframes twinkle { 0%,100%{opacity:.4;} 50%{opacity:1;} }
    .anim-bobble { animation: bobble 5s ease-in-out infinite; }
    .spark { position:absolute; border-radius:50%; background:#fff; pointer-events:none; animation: twinkle 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce){ .anim-bobble,.spark{animation:none;} }
    .labtag { position:fixed; top:12px; left:12px; z-index:50; background: var(--color-ink); color:#FFF9EE; font-weight:900; font-size:12px; padding:8px 14px; border-radius:999px; box-shadow:3px 3px 0 #B8456A; }
  </style>
</head>
<body class="antialiased">
  <a href="/karada-hero-lab/" class="labtag">◂ V5 夢の空 ・ 案を切り替え</a>

  <section class="relative min-h-[100svh] flex items-center justify-center px-6 sm:px-10 overflow-hidden"
           style="background: linear-gradient(to bottom, rgba(255,249,238,0.18) 0%, rgba(255,249,238,0.40) 60%, rgba(255,249,238,0.66) 100%), url(/images/karada/hero/sky.jpg) center/cover no-repeat, linear-gradient(180deg,#FCE9D8,#F6D9A0);">

    <span class="spark" style="top:18%; left:16%; width:8px; height:8px;"></span>
    <span class="spark" style="top:26%; right:20%; width:6px; height:6px; animation-delay:-1.5s;"></span>
    <span class="spark" style="top:14%; right:34%; width:5px; height:5px; animation-delay:-2.4s;"></span>
    <span class="spark" style="top:38%; left:30%; width:6px; height:6px; animation-delay:-3.1s;"></span>

    <div class="relative z-10 max-w-3xl mx-auto text-center pt-12 sm:pt-0">
      <div class="font-semibold text-ink/70 text-[18px] sm:text-[22px] tracking-[0.05em] mb-5 sm:mb-7" style="text-shadow:0 1px 8px rgba(255,249,238,0.85);">ビーガン王子が教える ——</div>
      <h1 class="font-jp-display font-black display-tight text-[44px] sm:text-[84px] lg:text-[104px] leading-[1.02] text-ink" style="text-shadow:0 2px 14px rgba(255,249,238,0.75);">
        植物の、<br/><span class="text-royal">本当のチカラ。</span>
      </h1>
      <p class="mt-10 sm:mt-12 max-w-xl mx-auto text-ink-soft text-[17px] sm:text-[19px] leading-[1.95]" style="text-shadow:0 1px 8px rgba(255,249,238,0.9);">
        強さも、美しさも、長生きも。<br/>植物には、ちゃんと理由がある。<br/>4つのテーマで、一緒に見てみよう。
      </p>
      <div class="mt-10 sm:mt-12 flex justify-center">
        <img src="/images/oji/oji_greeting.png" alt="ビーガン王子" class="w-44 sm:w-56 lg:w-64 anim-bobble drop-shadow-[0_12px_30px_rgba(31,24,18,0.22)]" loading="eager"/>
      </div>
      <div class="mt-8 sm:mt-12 inline-flex flex-col items-center gap-2 text-ink/50">
        <span class="text-[14px] tracking-[0.06em]">下にスクロール</span>
        <svg width="14" height="20" viewBox="0 0 14 20" fill="none" class="animate-bounce"><path d="M7 2 L7 16 M2 11 L7 16 L12 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>
      </div>
    </div>
  </section>
</body>
</html>
