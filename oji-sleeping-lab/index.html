<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oji Sleeping Stickers — ビーガン王子</title>
  <meta name="robots" content="noindex,nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    /* Seed rule — keeps the v4 browser parser happy (must precede @theme). */
    .__seed { color: inherit; }

    @theme {
      --color-paper: #FFF9EE;
      --color-cream: #FDF1DA;
      --color-royal: #C9223A;
      --color-gold: #D4A847;
      --color-ink: #1F1812;
      --color-muted: #786148;
      --font-noto-sans-jp: "Noto Sans JP", sans-serif;
    }

    html, body { background: #F1ECDB; color: var(--color-ink); }
    body { font-family: var(--font-noto-sans-jp); -webkit-font-smoothing: antialiased; }

    /* checkerboard reveals transparency on the die-cut stickers */
    .checker {
      background-color: #fbf7ec;
      background-image:
        linear-gradient(45deg, #e7dfc9 25%, transparent 25%),
        linear-gradient(-45deg, #e7dfc9 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #e7dfc9 75%),
        linear-gradient(-45deg, transparent 75%, #e7dfc9 75%);
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
    }
    /* alternate preview surfaces, toggled via the buttons */
    body[data-bg="paper"] .tile { background: #FFF9EE; background-image: none; }
    body[data-bg="royal"] .tile { background: #C9223A; background-image: none; }
    body[data-bg="dark"]  .tile { background: #221b15; background-image: none; }
    body[data-bg="line"]  .tile { background: #8aa6c0; background-image: none; } /* LINE chat blue-grey */

    .seg-btn { border: 2px solid var(--color-ink); background: #FFF9EE; }
    .seg-btn[aria-pressed="true"] { background: var(--color-ink); color: #FFF9EE; }
  </style>
</head>

<body data-bg="checker" class="min-h-screen">
  <header class="max-w-6xl mx-auto px-5 pt-10 pb-6">
    <p class="text-[13px] tracking-widest uppercase text-[color:var(--color-muted)] font-bold">Veganoji · sticker draft</p>
    <h1 class="mt-1 text-3xl sm:text-4xl font-black">王子のおやすみ・休憩スタンプ案</h1>
    <p class="mt-2 text-[15px] text-[color:var(--color-muted)] max-w-2xl">
      Sleeping &amp; resting poses of the prince, drafted as a LINE-stamp set — one character per
      image, transparent cut-out. <span id="count" class="font-bold text-[color:var(--color-ink)]"></span>
    </p>

    <div class="mt-5 flex flex-wrap items-center gap-2 text-[13px] font-bold">
      <span class="text-[color:var(--color-muted)] mr-1">Preview on:</span>
      <button class="seg-btn rounded-xl px-3 py-1.5" data-set="checker" aria-pressed="true">Transparent</button>
      <button class="seg-btn rounded-xl px-3 py-1.5" data-set="paper">Paper</button>
      <button class="seg-btn rounded-xl px-3 py-1.5" data-set="line">LINE chat</button>
      <button class="seg-btn rounded-xl px-3 py-1.5" data-set="royal">Royal</button>
      <button class="seg-btn rounded-xl px-3 py-1.5" data-set="dark">Dark</button>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-5 pb-20">
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-5"></div>
  </main>

  <script>
    const BASE = "../images/oji-sleeping/";
    const STAMPS = [
      ["curled_zzz",      "Curled up · Zzz",      "丸まってzzz"],
      ["on_back_relaxed", "Flat-out relaxed",     "大の字でリラックス"],
      ["hug_pillow",      "Cuddling a pillow",    "まくらをぎゅっ"],
      ["desk_nap",        "Desk nap",             "机でうたた寝"],
      ["yawn_stretch",    "Big yawn & stretch",   "あくび＆のび"],
      ["rub_eye",         "Rubbing sleepy eyes",  "ねむい目こすり"],
      ["cloud_sleep",     "Sleeping on a cloud",  "雲の上でおやすみ"],
      ["blanket_tuck",    "Snug under a blanket", "もうふでぬくぬく"],
      ["sitting_doze",    "Dozing off",           "すわってウトウト"],
      ["teacup_curl",     "Napping in a teacup",  "ティーカップでまるまり"],
      ["tummy_daydream",  "Daydreaming",          "うつ伏せでぼんやり"],
      ["hammock_lounge",  "Hammock lounging",     "ハンモックでゆらゆら"],
      ["goodnight_wave",  "Good-night wave",      "おやすみのあいさつ"],
      ["plushie_lean",    "Leaning on a plushie", "ぬいぐるみでzzz"],
      ["futon_sleep",     "Futon sleep",          "おふとんでぐっすり"],
      ["nod_off",         "Nodding off",          "すわって船こぎ"],
    ];

    const grid = document.getElementById("grid");
    let shown = 0;
    STAMPS.forEach(([slug, en, jp]) => {
      const fig = document.createElement("figure");
      fig.className = "rounded-2xl overflow-hidden border-[2.5px] border-[color:var(--color-ink)] shadow-[4px_4px_0_var(--color-ink)] bg-[color:var(--color-paper)]";
      fig.innerHTML = `
        <div class="tile checker aspect-square flex items-center justify-center p-2">
          <img src="${BASE}oji_sleeping_${slug}.png" alt="${en}" loading="lazy"
               class="max-h-full max-w-full object-contain" />
        </div>
        <figcaption class="px-3 py-2 border-t-[2.5px] border-[color:var(--color-ink)]">
          <div class="text-[14px] font-bold leading-tight">${jp}</div>
          <div class="text-[12px] text-[color:var(--color-muted)]">${en}</div>
        </figcaption>`;
      const img = fig.querySelector("img");
      img.addEventListener("error", () => { fig.remove(); updateCount(); });
      img.addEventListener("load", () => { shown++; updateCount(); });
      grid.appendChild(fig);
    });

    function updateCount() {
      document.getElementById("count").textContent =
        grid.children.length + " poses";
    }
    updateCount();

    // background preview toggle
    document.querySelectorAll(".seg-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.body.dataset.bg = btn.dataset.set;
        document.querySelectorAll(".seg-btn").forEach(b =>
          b.setAttribute("aria-pressed", b === btn ? "true" : "false"));
      });
    });
  </script>
</body>
</html>
