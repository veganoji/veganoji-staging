<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登録完了 — 王子通信</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{ --ink:#1F1812; --paper:#FFF9EE; --royal:#C9223A; --gold:#D4A847; --muted:#786148; --cream:#FDF1DA; }
    *{ box-sizing:border-box; } html,body{ margin:0; }
    body{ background:#EDE3CF; color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,"Noto Sans JP",sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card{ max-width:440px; width:100%; background:var(--paper); border:2.5px solid var(--ink); border-radius:20px; box-shadow:6px 6px 0 var(--ink); padding:34px 30px 30px; text-align:center; }
    .card img{ width:118px; height:auto; }
    h1{ font-size:26px; margin:14px 0 6px; }
    .en{ font-size:13px; letter-spacing:.06em; color:var(--muted); font-weight:700; text-transform:uppercase; }
    p{ font-size:15px; line-height:1.95; color:#3C2E22; margin:14px 0 0; }
    .links{ margin-top:22px; display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .btn{ display:inline-block; padding:10px 18px; font-size:13.5px; font-weight:800; text-decoration:none; border:2px solid var(--ink); border-radius:12px; }
    .btn-royal{ background:var(--royal); color:var(--paper); }
    .btn-ghost{ background:var(--paper); color:var(--ink); }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://veganoji.jp/images/oji/oji_celebrate.png" alt="ビーガン王子" />
    <div class="en">Subscription confirmed</div>
    <h1>登録、完了しました！🌱</h1>
    <p>ありがとう ♡ これから隔週で、王子からのお手紙が届きます。<br>新しいレシピ、活動報告、最新の動画を、ゆっくりお届けしますね。</p>
    <p style="font-size:13px;color:var(--muted);">You're all set — 王子通信 will land in your inbox every two weeks.</p>
    <div class="links">
      <a class="btn btn-royal" href="https://veganoji.jp/">ホームへ</a>
      <a class="btn btn-ghost" href="https://veganoji.jp/recipes/">レシピを見る</a>
      <a class="btn btn-ghost" href="https://veganoji.jp/vegfit/">ベジトレClub</a>
    </div>
  </div>
</body>
</html>
