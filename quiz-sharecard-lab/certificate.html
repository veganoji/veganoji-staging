<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>認定証シェアカード — ストーリー版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style type="text/tailwindcss">
    .__seed { color: inherit; }
    @theme {
      --color-paper: #FFF9EE; --color-paper-soft: #FDF1DA;
      --color-ink: #1F1812; --color-ink-soft: #3C2E22; --color-muted: #786148;
      --color-royal: #C9223A; --color-royal-deep: #9C1428; --color-gold: #D4A847; --color-gold-deep: #9C7E2A;
      --color-leaf: #6C9560; --color-leaf-deep: #3F6A3A;
      --font-noto-sans-jp: "Noto Sans JP", sans-serif;
    }
    html, body { background: var(--color-paper); color: var(--color-ink); }
    body { font-family: "Zen Maru Gothic", "Noto Sans JP", sans-serif; font-feature-settings: "palt"; -webkit-font-smoothing: antialiased; }
    .pill { display:inline-block; font-size:12px; font-weight:700; padding:3px 11px; border-radius:999px; border:2px solid var(--color-ink); background:var(--color-paper); }
    .f-cute { font-family: "Hachi Maru Pop", "Zen Maru Gothic", sans-serif; }
    .f-round { font-family: "Zen Maru Gothic", sans-serif; }

    /* ── preview stage scales the true Instagram-story card (1080×1920) down to fit ── */
    .stage { margin: 0 auto; }
    .cert {
      position: relative; width: 1080px; height: 1920px;
      transform-origin: top left;
      background-size: 100% 100%; background-repeat: no-repeat;   /* fill 9:16, keep full border */
      background-color: #FFFDF7;
      display: flex; flex-direction: column; align-items: center;
      padding: 270px 168px 250px;        /* keep content inside the frame's cream center */
      overflow: hidden;
    }
    .cert.noframe { border: 18px solid var(--color-gold); box-shadow: inset 0 0 0 8px var(--color-gold-deep); border-radius: 40px; padding: 150px 120px 140px; }

    /* soft "sticker on paper" lift — cream halo + faint ink drop (html2canvas-safe) */
    .lift-red { color: var(--color-royal);
      text-shadow: 3px 0 0 #FFFBF0, -3px 0 0 #FFFBF0, 0 3px 0 #FFFBF0, 0 -3px 0 #FFFBF0,
                   2px 2px 0 #FFFBF0, -2px 2px 0 #FFFBF0, 2px -2px 0 #FFFBF0, -2px -2px 0 #FFFBF0,
                   5px 10px 0 rgba(31,24,18,0.13); }

    .c-eyebrow { font-weight: 700; font-size: 34px; letter-spacing: 0.02em; color: var(--color-gold-deep); text-align: center; }
    .c-title { font-size: 150px; line-height: 1; letter-spacing: 0.06em; margin-top: 14px;
      display: flex; align-items: center; gap: 26px; }
    .c-title .spark { font-size: 64px; color: var(--color-gold); text-shadow: none; }
    .c-oji { width: 372px; height: auto; margin-top: 18px; filter: drop-shadow(0 16px 26px rgba(31,24,18,0.18)); }
    .c-scoreline { font-weight: 700; font-size: 56px; color: var(--color-ink); margin-top: 26px; }
    .c-scoreline b { color: var(--color-royal); font-size: 64px; }
    .c-big { display: flex; align-items: baseline; line-height: 0.86; margin-top: 6px; }
    .c-big .num { font-weight: 900; font-size: 232px; }
    .c-big .den { font-weight: 900; font-size: 104px; color: rgba(31,24,18,0.42); margin-left: 8px; }
    .c-rank { margin-top: 30px; font-size: 52px; color: var(--color-leaf-deep);
      background: #ECF5E6; border: 4px solid var(--color-leaf-deep); border-radius: 999px; padding: 12px 46px; box-shadow: 6px 6px 0 var(--color-leaf-deep); }
    .c-foot { margin-top: auto; width: 100%; display: flex; align-items: flex-end; justify-content: space-between; }
    .c-issuer { font-weight: 700; font-size: 32px; color: var(--color-ink-soft); text-align: left; line-height: 1.3; }
    .c-issuer .u { display: block; font-family: var(--font-noto-sans-jp); font-size: 26px; color: var(--color-muted); font-weight: 500; margin-top: 4px; }
    .c-date { font-weight: 700; font-size: 30px; color: var(--color-muted); }
    .c-seal { position: absolute; right: 150px; bottom: 300px; width: 150px; height: 150px; object-fit: contain;
      transform: rotate(-8deg); filter: drop-shadow(0 5px 10px rgba(31,24,18,0.20)); }

    /* controls */
    .btn { display:inline-flex; align-items:center; gap:8px; font-weight:900; font-size:15px; border:2.5px solid var(--color-ink);
      border-radius:14px; box-shadow:4px 4px 0 var(--color-ink); padding:11px 20px; cursor:pointer; text-decoration:none; }
    .btn:active { transform: translate(2px,2px); box-shadow:2px 2px 0 var(--color-ink); }
    .btn-leaf { background: var(--color-leaf); color:#fff; }
    .btn-ghost { background: var(--color-paper); color: var(--color-ink); }
    input[type=range]{ accent-color: var(--color-royal); }
  </style>
</head>
<body class="antialiased">
  <div class="max-w-2xl mx-auto px-5 py-8">
    <div class="text-center mb-5">
      <div class="pill mb-3 f-round">認定証カード · ストーリー版 1080×1920 · noindex</div>
      <p class="f-round text-ink-soft text-[14px] leading-[1.8]">インスタのストーリーやスマホに合う縦長サイズにしました。スライダーで点数を動かして、気に入ったら <b>PNGで保存</b> 。</p>
    </div>

    <!-- controls -->
    <div class="flex flex-wrap items-center justify-center gap-4 mb-6">
      <label class="flex items-center gap-3 f-round font-bold text-[14px]">
        点数
        <input id="score" type="range" min="0" max="10" value="7" class="w-48" />
        <span id="score-readout" class="inline-flex items-center justify-center min-w-[58px] f-round font-black text-[16px] text-royal border-2 border-ink rounded-lg px-2 py-1">7 / 10</span>
      </label>
      <button id="dl" class="btn btn-leaf">⬇ PNGで保存</button>
      <button id="frame-cycle" class="btn btn-ghost" title="枠のデザインを切り替え">枠を切り替え</button>
    </div>

    <!-- the true-1080×1920 card (scaled for preview) -->
    <div class="stage" id="stage">
      <div class="cert noframe" id="cert">
        <div class="c-eyebrow f-round">しらなかった！ごはんと地球のクイズ</div>
        <div class="c-title f-cute lift-red"><span class="spark">✦</span>認定証<span class="spark">✦</span></div>
        <img class="c-oji" src="/images/oji/oji_celebrate.png" alt="" crossorigin="anonymous" />
        <div class="c-scoreline f-round">10問中 <b id="c-correct">7</b>問 正解！</div>
        <div class="c-big f-round"><span class="num lift-red" id="c-num">7</span><span class="den">/ 10</span></div>
        <div class="c-rank f-cute">称号 ― <span id="c-rank">ものしり王子</span></div>
        <div class="c-foot">
          <div class="c-issuer f-round">ビーガン王子 認定<span class="u">veganoji.jp/quiz</span></div>
          <img class="c-seal" src="/images/quiz-bg/badge.png" alt="" crossorigin="anonymous" />
          <div class="c-date f-round" id="c-date">2026.6.23</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const cert = $('cert'), stage = $('stage');

    // candidate portrait frames; index 0 = CSS fallback. Default = storyA (scalloped, matches frameC).
    const FRAMES = ['', '/quiz-sharecard-lab/img/storyA.jpg', '/quiz-sharecard-lab/img/storyC.jpg', '/quiz-sharecard-lab/img/storyB.jpg'];
    let frameIdx = 1;
    function applyFrame() {
      const f = FRAMES[frameIdx];
      if (f) { cert.style.backgroundImage = `url('${f}')`; cert.classList.remove('noframe'); }
      else { cert.style.backgroundImage = 'none'; cert.classList.add('noframe'); }
    }

    function rankFor(s) {
      if (s === 10) return '地球はかせ';
      if (s >= 7) return 'ものしり王子';
      if (s >= 4) return 'なかなか探究家';
      if (s >= 1) return 'みならい';
      return 'これから！';
    }

    function render(s) {
      $('c-correct').textContent = s;
      $('c-num').textContent = s;
      $('c-rank').textContent = rankFor(s);
      $('score-readout').textContent = s + ' / 10';
    }

    // today's date (real card would use the play date)
    (function setDate(){ const d = new Date(); $('c-date').textContent = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate(); })();

    // scale the 1080×1920 card to fit the viewport
    function fit() {
      const maxW = Math.min(window.innerWidth - 40, 430);
      const s = maxW / 1080;
      cert.style.transform = `scale(${s})`;
      stage.style.width = (1080 * s) + 'px';
      stage.style.height = (1920 * s) + 'px';
    }
    window.addEventListener('resize', fit);

    $('score').addEventListener('input', (e) => render(parseInt(e.target.value, 10)));
    $('frame-cycle').addEventListener('click', () => { frameIdx = (frameIdx + 1) % FRAMES.length; applyFrame(); });

    $('dl').addEventListener('click', async () => {
      await document.fonts.ready;
      const prev = cert.style.transform;
      cert.style.transform = 'none';               // capture at true 1080×1920
      const canvas = await html2canvas(cert, { width: 1080, height: 1920, scale: 1, useCORS: true, backgroundColor: null });
      cert.style.transform = prev;
      const a = document.createElement('a');
      a.download = 'veganoji-quiz-' + $('score').value + 'of10.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });

    applyFrame(); render(7); fit();
  </script>
</body>
</html>
