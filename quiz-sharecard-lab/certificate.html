<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>認定証カード — 実物プレビュー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- SAME renderer the quiz uses → this preview is pixel-identical to the saved card -->
  <script src="/quiz/cert-card.js" defer></script>
  <style>
    :root { --paper:#FFF9EE; --ink:#1F1812; --ink-soft:#3C2E22; --muted:#786148; --royal:#C9223A; --leaf:#6C9560; }
    * { box-sizing: border-box; }
    html, body { margin:0; background:var(--paper); color:var(--ink); }
    body { font-family:"Zen Maru Gothic","Noto Sans JP",sans-serif; -webkit-font-smoothing:antialiased; }
    .wrap { max-width:560px; margin:0 auto; padding:28px 20px 60px; text-align:center; }
    .pill { display:inline-block; font-size:12px; font-weight:700; padding:4px 13px; border-radius:999px; border:2px solid var(--ink); background:var(--paper); }
    h1 { font-size:22px; margin:16px 0 6px; }
    .sub { color:var(--ink-soft); font-size:13.5px; line-height:1.85; margin:0 auto 4px; max-width:30em; }
    .note { color:var(--muted); font-size:12px; line-height:1.7; margin:8px auto 0; max-width:30em; }
    .controls { display:flex; flex-wrap:wrap; gap:16px; align-items:center; justify-content:center; margin:22px 0 20px; }
    .controls label { display:inline-flex; align-items:center; gap:10px; font-weight:700; font-size:14px; }
    input[type=range]{ accent-color:var(--royal); width:190px; }
    #readout { display:inline-flex; align-items:center; justify-content:center; min-width:60px; font-weight:900; font-size:16px; color:var(--royal); border:2px solid var(--ink); border-radius:9px; padding:5px 8px; }
    .btn { font-family:inherit; font-weight:900; font-size:15px; border:2.5px solid var(--ink); border-radius:14px; box-shadow:4px 4px 0 var(--ink); padding:11px 22px; cursor:pointer; background:var(--leaf); color:#fff; }
    .btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 var(--ink); }
    .stage { margin:0 auto; width:min(90vw, 400px); }
    #card { width:100%; height:auto; display:block; border-radius:12px; box-shadow:0 10px 30px rgba(31,24,18,.16); background:#FFFDF7; }
    .loading { color:var(--muted); font-size:13px; padding:40px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="pill">認定証カード · クイズと同一 · noindex</div>
    <h1>認定証カード — 実物プレビュー</h1>
    <p class="sub">クイズの結果画面で保存されるカードと<b>まったく同じ描画</b>です（共通の <code>&lt;canvas&gt;</code> レンダラー）。スライダーで点数を変えて確認できます。</p>

    <div class="controls">
      <label>点数 <input id="score" type="range" min="0" max="10" value="7" /> <span id="readout">7 / 10</span></label>
      <button id="dl" class="btn">⬇ PNGで保存</button>
    </div>

    <div class="stage">
      <canvas id="card" width="1080" height="1920"></canvas>
      <div id="loading" class="loading">読み込み中…</div>
    </div>
    <p class="note">※ このプレビューはクイズ本体と同じ <code>/quiz/cert-card.js</code> で描いています。ここが正しければ、iPhone・PC どちらで保存しても同じ画像になります。</p>
  </div>

  <script>
    var cv = document.getElementById('card');
    var scoreEl = document.getElementById('score');
    var readout = document.getElementById('readout');
    var loading = document.getElementById('loading');

    function score() { return parseInt(scoreEl.value, 10); }
    function render() {
      readout.textContent = score() + ' / 10';
      if (!window.CertCard) return;
      window.CertCard.draw(score(), cv).then(function () { loading.style.display = 'none'; });
    }
    scoreEl.addEventListener('input', render);

    // desktop → download · mobile (iOS can't auto-download) → full-screen long-press save
    document.getElementById('dl').addEventListener('click', function () {
      window.CertCard.blob(score()).then(function (blob) {
        if (!blob) return;
        var name = window.CertCard.filename ? window.CertCard.filename(score()) : ('veganoji-quiz-' + score() + 'of10.png');
        if (window.matchMedia('(pointer: coarse)').matches) {
          var u = URL.createObjectURL(blob);
          var ov = document.createElement('div');
          ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(31,24,18,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:22px';
          ov.innerHTML = '<div style="color:#FFF9EE;font-weight:700;font-size:16px;text-align:center;line-height:1.7">画像を長押しして<br>「&#8220;写真&#8221;に保存」を選んでね</div>' +
            '<img src="' + u + '" style="max-width:86%;max-height:70vh;border-radius:16px;box-shadow:0 12px 34px rgba(0,0,0,.45)"/>' +
            '<button type="button" style="font-family:inherit;font-weight:800;font-size:15px;background:#FFF9EE;color:#1F1812;border:2.5px solid #1F1812;border-radius:12px;box-shadow:3px 3px 0 #1F1812;padding:11px 26px">閉じる</button>';
          function close() { ov.remove(); URL.revokeObjectURL(u); }
          ov.querySelector('button').addEventListener('click', close);
          ov.addEventListener('click', function (e) { if (e.target === ov) close(); });
          document.body.appendChild(ov);
        } else {
          var url = URL.createObjectURL(blob), a = document.createElement('a');
          a.href = url; a.download = name; document.body.appendChild(a); a.click(); a.remove();
          setTimeout(function () { URL.revokeObjectURL(url); }, 8000);
        }
      });
    });

    (function boot() { if (window.CertCard) render(); else setTimeout(boot, 40); })();
  </script>
</body>
</html>
