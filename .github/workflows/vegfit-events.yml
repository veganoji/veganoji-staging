name: Refresh ベジトレ events

on:
  schedule:
    - cron: "20 21 * * *"   # ~06:20 JST daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch upcoming events from Monday → vegfit/events.json
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: |
          python3 - <<'PY'
          import os, json, subprocess, datetime
          TOKEN = os.environ["MONDAY_TOKEN"]; BOARD = "18400001083"
          Q = ('{"query":"query { boards(ids: [%s]) { items_page(limit: 100) { items { name '
               'column_values { id text value } } } } }"}') % BOARD
          open("q.json","w").write(Q)
          out = subprocess.run(["curl","-s","https://api.monday.com/v2",
              "-H","Authorization: "+TOKEN,"-H","Content-Type: application/json",
              "-H","API-Version: 2024-10","--data","@q.json"], capture_output=True, text=True).stdout
          items = json.loads(out)["data"]["boards"][0]["items_page"]["items"]
          today = datetime.date.today()
          def col(it,cid):
              for c in it["column_values"]:
                  if c["id"]==cid: return c
              return {}
          def ppl(c):
              try: return len(json.loads(c.get("value") or "").get("personsAndTeams",[]))
              except Exception: return 0
          ev=[]
          for it in items:
              dt=(col(it,"date_mm0h93x5").get("text") or "").strip()
              try: d_=datetime.date.fromisoformat(dt)
              except Exception: continue
              if d_<today or ppl(col(it,"person"))<1: continue
              link=""
              try: link=(json.loads(col(it,"link_mm0hbrzc").get("value") or "{}") or {}).get("url","") or ""
              except Exception: pass
              ev.append({"name":it["name"],"date":dt,"month":d_.month,"day":d_.day,
                  "location":(col(it,"text_mm0h8w4a").get("text") or "").strip(),
                  "distance":(col(it,"text_mm0h6tvv").get("text") or "").strip(),
                  "type":(col(it,"status_12").get("text") or "").strip(),"link":link,
                  "registered":ppl(col(it,"person")),"interested":ppl(col(it,"multiple_person_mm0hx9ff"))})
          ev.sort(key=lambda e:e["date"])
          json.dump({"updated":today.isoformat(),"events":ev}, open("vegfit/events.json","w"), ensure_ascii=False, indent=2)
          print("wrote", len(ev), "events")
          PY
      - name: Commit if changed
        run: |
          if ! git diff --quiet vegfit/events.json; then
            git config user.name "vegfit-bot"
            git config user.email "bot@veganoji.jp"
            git add vegfit/events.json
            git commit -m "chore: refresh vegfit events.json"
            git push
          else
            echo "events.json unchanged"
          fi
