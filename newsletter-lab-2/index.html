<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>王子通信 — デザイン案（改）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#241d1a;font-family:'Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;color:#f4ece0;-webkit-font-smoothing:antialiased}
  .lab-head{text-align:center;padding:48px 20px 6px}
  .lab-head .ey{font-size:12px;letter-spacing:.22em;color:#E0A82E;font-weight:800}
  .lab-head h1{font-size:31px;margin:9px 0 8px;color:#fff;font-weight:900}
  .lab-head p{color:#bcab97;font-size:15px;max-width:660px;margin:0 auto;line-height:1.75}
  .nav{position:sticky;top:0;z-index:10;background:rgba(36,29,26,.93);backdrop-filter:saturate(1.3) blur(9px);text-align:center;padding:13px 10px;border-bottom:1px solid #3a302b;margin-top:26px}
  .nav a{display:inline-block;margin:4px;padding:8px 16px;border-radius:999px;background:#332a25;color:#f4ece0;text-decoration:none;font-size:13px;font-weight:700;border:1px solid #4a3e37;transition:.15s}
  .nav a:hover{background:#C9223A;border-color:#C9223A;color:#fff}
  section{padding:44px 16px 8px;max-width:780px;margin:0 auto;scroll-margin-top:64px}
  .dlabel{margin:0 auto 20px;max-width:600px;padding-left:2px}
  .dnum{font-size:19px;font-weight:900;color:#fff}
  .dlabel p{color:#bcab97;font-size:14px;margin:7px 0 0;line-height:1.65}
  .foot-note{text-align:center;color:#8a7d6e;font-size:13px;padding:30px 20px 60px;line-height:1.7;max-width:640px;margin:0 auto}
</style>
</head>
<body>
  <div class="lab-head">
    <div class="ey">VEGAN OJI ・ NEWSLETTER DESIGN BOARD</div>
    <h1>王子通信 — デザイン案（改）</h1>
    <p>#1 と #4 を、ご要望を反映してブラッシュアップ：マストヘッドを中央寄せ＋王冠／上部にもSNSアイコン／フッターの雲（空）背景を復活／「いっしょに」カードに各ページの公式ロゴ（バッジ）／ブログは2本まで。</p>
  </div>
  <nav class="nav">
    <a href="#d-watercolor">01 絵本ウォーターカラー</a>
    <a href="#d-royal">04 王室</a>
  </nav>
  <div id="designs"></div>
  <div class="foot-note">静的なデザイン見本です。選ばれた案を投稿スタジオの実装に反映します。<br>背景画像はメールでは Gmail / Apple Mail / iOS で表示され、Outlook デスクトップではフォールバック色になります。</div>

<script>
const S = "https://veganoji.jp";
const C = {
  month: "2026年6月号",
  intro: "こんにちは、ビーガン王子です。梅雨の季節。雨の音を聞きながら台所でコトコト煮込む時間が、この時期のひそかな楽しみです。",
  signoff: "今月も読んでくれて、ありがとう。<br>あなたの毎日に、植物のやさしさが少しでも届きますように。<br>また来月、お手紙を書きます。<br><b>— ビーガン王子 アレックス</b>",
  activity: [
    [S+"/images/blog/2026/onetime-appearance-mote-ranking-6.png", "ONETIME「モテランキング6」2本に出演"],
    [S+"/images/blog/2026/tbs-monitoring-snowboard-coach.png", "TBS『モニタリング』再出演 — 雪山ロケ"],
  ],
  blog: [
    [S+"/images/blog/2026/ai-tastier-plant-based-meat-lab.png", "「おいしくない」を、AIが変える"],
    [S+"/images/blog/2026/vegans-vs-meat-eaters-who-is-stronger.png", "肉を食べなくても、こんなに強い"],
  ],
  recipes: [
    [S+"/images/recipes/veg-gyoza.jpg", "野菜餃子", "40分", "約24個分"],
    [S+"/images/recipes/koya-karaage.jpg", "高野豆腐の唐揚げ", "25分", "2人分"],
    [S+"/images/recipes/mapo-tofu.jpg", "麻婆豆腐", "20分", "2人分"],
  ],
  videos: [
    ["https://i.ytimg.com/vi/KZoupbn1sMA/hqdefault.jpg", "日本のビーガン肉とは違う作り方！？"],
    ["https://i.ytimg.com/vi/wclHrcL0Ggc/hqdefault.jpg", "LAのスーパーで買ったビーガン食品を食べ比べ"],
    ["https://i.ytimg.com/vi/4MCnCHTkjk8/hqdefault.jpg", "オーガニックスーパーに潜入！爆買い"],
  ],
  links: [
    [S+"/images/links-hero/cand1-veggie.jpg", "ベジトレClub", "植物の力で、楽しく強くなる。", S+"/images/favicons/karada-180.png"],
    [S+"/images/quiz-bg/intro.jpg", "ごはんと地球のクイズ", "10問で「しらなかった！」に出会う。", S+"/images/favicons/chikyu-180.png"],
    [S+"/images/recipes/veg-gyoza.jpg", "王子のレシピ", "植物性の和ごはん、今日の一品。", S+"/images/links-emblems/recipe.png"],
    [S+"/images/links-hero/cand3-royal.jpg", "応援する", "王子業の次の一歩を、いっしょに。", S+"/images/favicons/crown-180.png"],
  ],
};

function socialRow(sz){
  const items = ["ig","yt","tt","x","line"].map(s => `<td style="padding:0 5px;"><img src="${S}/images/social/${s}.png" alt="" width="${sz}" style="display:block;width:${sz}px;height:${sz}px;"></td>`).join("");
  return `<table cellspacing="0" cellpadding="0" align="center" style="margin:0 auto;"><tr>${items}</tr></table>`;
}

function arrow(t){ return `<span style="display:inline-block;width:34px;height:34px;border-radius:50%;background:${t.arrowBg};border:2px solid ${t.arrowBd};color:${t.arrowFg};text-align:center;line-height:31px;font-weight:900;font-size:17px;${t.arrowShadow||''}">&#8594;</span>`; }

function secHead(t, title){ return `<div style="padding:28px 24px 4px;"><div style="border-left:6px solid ${t.accent};padding-left:12px;font-size:20px;font-weight:900;color:${t.ink};line-height:1.2;">${title}</div></div>`; }

function row(t, img, title, sub, play){
  const playBadge = play ? `<span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:32px;height:32px;border-radius:50%;background:rgba(201,34,58,.94);border:2px solid #fff;color:#fff;text-align:center;line-height:30px;font-size:12px;">&#9658;</span>` : "";
  return `<a href="#" style="text-decoration:none;display:block;margin:0 24px 10px;">
    <table width="100%" cellspacing="0" cellpadding="0" style="background:${t.cardBg};border:${t.border};border-radius:${t.cardRadius};overflow:hidden;${t.cardShadow}">
      <tr>
        <td width="118" style="padding:0;"><div style="position:relative;width:118px;height:90px;"><img src="${img}" alt="" style="display:block;width:118px;height:90px;object-fit:cover;">${playBadge}</div></td>
        <td style="padding:11px 13px;"><div style="font-size:14px;font-weight:800;color:${t.ink};line-height:1.5;">${title}</div>${sub ? `<div style="font-size:11.5px;color:${t.sub};margin-top:6px;font-weight:700;letter-spacing:.02em;">${sub}</div>` : ""}</td>
        <td width="50" align="center" style="padding-right:11px;">${arrow(t)}</td>
      </tr>
    </table></a>`;
}

function moreLink(t, label){ return `<div style="text-align:center;padding:12px 0 0;"><a href="#" style="font-size:12.5px;font-weight:800;color:${t.gold};text-decoration:none;border-bottom:2px solid ${t.gold};padding-bottom:2px;">${label} &#8594;</a></div>`; }

function linkCard(t, img, title, teaser, emblem){
  return `<a href="#" style="text-decoration:none;display:block;"><div style="position:relative;border:${t.border};border-radius:16px;overflow:hidden;${t.cardShadow}height:120px;background-image:linear-gradient(180deg,rgba(20,15,10,.02),rgba(20,15,10,.74)),url('${img}');background-size:cover;background-position:center;">
    <img src="${emblem}" alt="" style="position:absolute;top:9px;left:9px;width:56px;height:56px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.45));">
    <div style="position:absolute;left:0;right:0;bottom:0;padding:11px 13px;"><div style="font-size:15px;font-weight:900;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.75);">${title}</div><div style="font-size:11px;color:#fff;opacity:.96;text-shadow:0 1px 5px rgba(0,0,0,.8);margin-top:2px;">${teaser}</div></div>
  </div></a>`;
}

function together(t){
  const L = C.links.map(l => linkCard(t, l[0], l[1], l[2], l[3]));
  return `<div style="padding:12px 24px 0;"><table width="100%" cellspacing="0" cellpadding="0"><tr><td width="50%" style="padding:0 6px 12px 0;">${L[0]}</td><td width="50%" style="padding:0 0 12px 6px;">${L[1]}</td></tr><tr><td width="50%" style="padding:0 6px 0 0;">${L[2]}</td><td width="50%" style="padding:0 0 0 6px;">${L[3]}</td></tr></table></div>`;
}

function bubble(t, mascot, html, side){
  const m = `<td width="92" valign="middle" align="center"><img src="${S}/images/oji/${mascot}" alt="" width="82" style="display:block;width:82px;height:auto;"></td>`;
  const b = `<td valign="middle" style="padding:0 4px;"><div style="background:${t.bubbleBg};border:${t.border};border-radius:17px;padding:13px 16px;font-size:14px;line-height:1.9;color:${t.ink};">${html}</div></td>`;
  return `<div style="padding:22px 24px 2px;"><table width="100%" cellspacing="0" cellpadding="0"><tr>${side === "left" ? m + b : b + m}</tr></table></div>`;
}

function mast(t){
  return `<div style="background:${t.mastBg};padding:24px 24px 17px;text-align:center;">
      <div style="font-size:11px;letter-spacing:.24em;color:${t.mastEy};font-weight:700;">VEGAN OJI NEWSLETTER</div>
      <table cellspacing="0" cellpadding="0" align="center" style="margin:8px auto 0;"><tr>
        <td valign="middle" style="padding-right:11px;"><img src="${S}/images/voji-logos/vegan-oji-crown.png" alt="" width="48" style="display:block;width:48px;height:auto;"></td>
        <td valign="middle"><div style="font-size:33px;font-weight:900;color:${t.mastFg};line-height:1;${t.mastTextShadow||''}">王子通信</div></td>
      </tr></table>
      <div style="font-size:12px;color:${t.mastFg};opacity:.85;margin-top:9px;">${C.month}</div>
    </div>
    <div style="height:5px;background:${t.gold};"></div>
    <div style="background:${t.pageBg};text-align:center;padding:14px 0 0;">${socialRow(26)}</div>`;
}

function foot(t){
  return `<div style="background:#EFE6CF url('${S}/images/links-hero/cand2-sky.jpg') center bottom / cover no-repeat;padding:26px 24px 30px;text-align:center;">
    <img src="${S}/images/oji/oji_sleeping_cloud.png" alt="" width="138" style="display:block;width:138px;height:auto;margin:0 auto 6px;">
    <div style="font-size:15px;font-weight:900;color:#1F1812;">ビーガン王子 ・ Vegan Oji</div>
    <div style="margin:13px 0 0;">${socialRow(30)}</div>
    <div style="font-size:11px;color:#5C4A36;margin-top:14px;line-height:1.9;font-weight:600;">ビーガン王子株式会社　〒101-0054 東京都千代田区神田錦町3-15 錦精社神田ビル2階248号室<br><span style="text-decoration:underline;">配信を停止する</span></div>
  </div>`;
}

function renderEmail(t){
  return `<div style="background:${t.outer};padding:22px 14px 28px;border-radius:18px;">
    <div style="max-width:600px;margin:0 auto;background:${t.pageBg};border:${t.pageBorder||t.border};border-radius:${t.outerRadius||"20px"};overflow:hidden;${t.pageShadow||""}">
      ${mast(t)}
      ${bubble(t, "oji_greeting.png", C.intro, "left")}
      ${secHead(t, "活動報告")}${C.activity.map(a => row(t, a[0], a[1])).join("")}
      ${secHead(t, "ブログ投稿")}${C.blog.slice(0,2).map(b => row(t, b[0], b[1])).join("")}${moreLink(t, "ブログをもっと見る")}
      ${secHead(t, "王子のキッチン")}${C.recipes.map(r => row(t, r[0], r[1], r[2] + " ・ " + r[3])).join("")}${moreLink(t, "レシピをもっと見る")}
      ${secHead(t, "うごく王子")}${C.videos.map(v => row(t, v[0], v[1], null, true)).join("")}
      ${secHead(t, "いっしょに")}${together(t)}
      ${bubble(t, "oji_writing.png", C.signoff, "right")}
      ${foot(t)}
    </div>
  </div>`;
}

const T = {
  watercolor: { key:"watercolor", outer:`#E4CFA0 url('${S}/images/decorations/hero-watercolor.jpg') center top / cover`, pageBg:"#FFFBF2", border:"3px solid #1F1812", cardBg:"#FFFFFF", cardRadius:"15px", cardShadow:"box-shadow:0 5px 14px rgba(31,24,18,.12);", ink:"#1F1812", sub:"#A06A1E", accent:"#C9223A", gold:"#C29A33", arrowBg:"#C9223A", arrowBd:"#1F1812", arrowFg:"#fff", bubbleBg:"#FFFFFF", mastBg:"#C9223A", mastFg:"#FFF9EE", mastEy:"#F0D58A", pageShadow:"box-shadow:0 20px 54px rgba(31,24,18,.34);" },
  royal: { key:"royal", outer:`#54101D url('${S}/images/decorations/damask-tile.png')`, pageBg:"#FFF9EE", border:"3px solid #C9A23E", cardBg:"#FFFDF6", cardRadius:"12px", cardShadow:"", ink:"#1F1812", sub:"#9C7E2A", accent:"#9C1428", gold:"#C9A23E", arrowBg:"#9C1428", arrowBd:"#C9A23E", arrowFg:"#F0D58A", bubbleBg:"#FFFDF6", mastBg:"#7A1020", mastFg:"#F6E3A6", mastEy:"#E0B850", pageBorder:"3px solid #C9A23E", pageShadow:"box-shadow:0 20px 54px rgba(0,0,0,.5);" },
};

const ORDER = ["watercolor","royal"];
const META = {
  watercolor: ["01 ・ 絵本ウォーターカラー (Storybook)", "温かい水彩の日本風景を背景に、ぶ厚いインクの縁取り。手描き絵本のような、いちばん王子らしい世界観。"],
  royal: ["04 ・ 王室 (Royal)", "ダマスク模様に赤×金、王冠モチーフ。気品と格調のある、ラグジュアリーなデザイン。"],
};

document.getElementById("designs").innerHTML = ORDER.map(k =>
  `<section id="d-${k}"><div class="dlabel"><div class="dnum">${META[k][0]}</div><p>${META[k][1]}</p></div>${renderEmail(T[k])}</section>`
).join("");
</script>
</body>
</html>
