<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero BG Lab · ビーガン王子 リンク集</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{
      --paper:#FFF9EE; --cream:#FDF1DA; --cream2:#F6E4BD;
      --royal:#C9223A; --gold:#D4A847; --ink:#1F1812; --ink-soft:#3C2E22; --muted:#786148;
      --sky:#B5D5E8; --blush:#F8C8D2; --leaf:#6C9560; --line:#E9D9B5;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:"Noto Sans JP",sans-serif; color:var(--ink); background:#E7E1D5; }

    .lab-head{ max-width:560px; margin:0 auto; padding:26px 20px 10px; text-align:center; }
    .lab-head h1{ font-weight:900; font-size:22px; margin:0 0 6px; letter-spacing:-.01em; }
    .lab-head p{ font-size:13px; color:var(--muted); margin:4px 0; line-height:1.55; }
    .lab-head a{ color:var(--royal); font-weight:700; }
    .lab-note{ display:inline-block; margin-top:8px; font-size:11.5px; background:#fff; border:1.5px solid var(--line); border-radius:999px; padding:5px 12px; color:var(--ink-soft); }

    .grid{ max-width:560px; margin:0 auto; padding:14px 16px 60px; display:flex; flex-direction:column; gap:26px; }

    .variant{ background:#fff; border:2px solid var(--ink); border-radius:20px; overflow:hidden; box-shadow:5px 6px 0 rgba(31,24,18,.16); }
    .variant-head{ display:flex; align-items:baseline; gap:9px; padding:13px 16px 11px; border-bottom:1.5px dashed var(--line); flex-wrap:wrap; }
    .v-tag{ font-weight:900; font-size:12px; color:#fff; background:var(--royal); border-radius:7px; padding:2px 8px; flex-shrink:0; }
    .v-name{ font-weight:900; font-size:15.5px; }
    .v-jp{ font-size:12.5px; color:var(--muted); font-weight:700; }
    .v-note{ flex-basis:100%; font-size:12px; color:var(--ink-soft); margin-top:3px; line-height:1.5; }

    /* The rendered hero (cropped to its top) */
    .hero-stage{ position:relative; height:540px; overflow:hidden; background:var(--paper); }
    .hero-stage::after{ content:""; position:absolute; left:0; right:0; bottom:0; height:120px; background:linear-gradient(transparent, var(--paper)); pointer-events:none; z-index:2; }
    .hero-unit{ position:relative; z-index:3; max-width:430px; margin:0 auto; padding:34px 24px 0; text-align:center; }

    .avatar{ width:124px; height:124px; margin:0 auto; border-radius:999px; overflow:hidden;
      border:3px solid var(--ink); box-shadow:5px 5px 0 var(--ink); background:linear-gradient(165deg,#fff,var(--cream)); }
    .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }
    .h-name{ font-weight:900; font-size:28px; letter-spacing:-.03em; margin:14px 0 0; }
    .h-alex{ font-weight:900; font-size:13px; color:var(--royal); letter-spacing:.06em; margin-top:1px; }
    .h-role{ font-size:12.5px; color:var(--ink-soft); font-weight:500; margin:8px 0 0; }
    .h-tag{ font-size:13.5px; font-weight:700; margin:9px 0 0; }
    .h-social{ display:flex; gap:9px; justify-content:center; margin-top:16px; }
    .h-social img{ width:42px; height:42px; object-fit:contain; filter:drop-shadow(0 3px 5px rgba(31,24,18,.12)); }

    .snippet{ margin:0; background:#1F1812; color:#F4E7CC; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
      font-size:11px; line-height:1.5; padding:12px 14px; white-space:pre-wrap; word-break:break-word; border-top:2px solid var(--ink); }
    .snippet b{ color:#E8C76F; font-weight:700; }

    /* ─────────── Background variants ─────────── */
    .bg-simple{ background:var(--paper); }
    .bg-simple::before{ content:""; position:absolute; inset:0; z-index:1;
      -webkit-mask:url('/images/decorations/crown-pattern.svg') repeat; mask:url('/images/decorations/crown-pattern.svg') repeat;
      -webkit-mask-size:150px 150px; mask-size:150px 150px; background:var(--royal); opacity:.05; }

    .bg-glow{ background:
      radial-gradient(130% 78% at 50% -10%, rgba(216,168,71,.40) 0%, rgba(248,200,210,.28) 30%, rgba(181,213,232,.16) 50%, rgba(255,249,238,0) 74%),
      var(--paper); }

    .bg-wash{ background:
      linear-gradient(180deg, rgba(181,213,232,.62) 0%, rgba(216,168,71,.16) 40%, rgba(248,200,210,.32) 62%, rgba(255,249,238,0) 96%),
      var(--paper); }

    .bg-sunrise{ background:
      radial-gradient(120% 70% at 50% -8%, rgba(216,168,71,.62) 0%, rgba(232,199,111,.34) 26%, rgba(255,249,238,0) 66%),
      var(--paper); }

    .bg-royal{ background:
      radial-gradient(115% 72% at 50% -6%, rgba(201,34,58,.30) 0%, rgba(229,80,99,.16) 30%, rgba(255,249,238,0) 64%),
      var(--paper); }

    .bg-skyleaf{ background:
      linear-gradient(180deg, rgba(181,213,232,.66) 0%, rgba(108,149,96,.20) 42%, rgba(255,249,238,0) 92%),
      var(--paper); }

    .bg-blush{ background:
      radial-gradient(120% 75% at 50% -8%, rgba(248,200,210,.55) 0%, rgba(232,199,111,.18) 38%, rgba(255,249,238,0) 72%),
      var(--paper); }

    .bg-crownpanel{ background:linear-gradient(180deg, var(--cream) 0%, var(--paper) 78%); }
    .bg-crownpanel::before{ content:""; position:absolute; inset:0; z-index:1;
      -webkit-mask:url('/images/decorations/crown-pattern.svg') repeat; mask:url('/images/decorations/crown-pattern.svg') repeat;
      -webkit-mask-size:120px 120px; mask-size:120px 120px; background:var(--gold); opacity:.16; }

    .bg-img1{ background:url('/images/links-hero/cand1-veggie.jpg') center top / cover no-repeat, var(--paper); }
    .bg-img2{ background:url('/images/links-hero/cand2-sky.jpg') center top / cover no-repeat, var(--paper); }
    .bg-img3{ background:url('/images/links-hero/cand3-royal.jpg') center top / cover no-repeat, var(--paper); }
  </style>
</head>
<body>
  <header class="lab-head">
    <h1>Hero Background Lab</h1>
    <p>The same <a href="/links/">/links/</a> hero, rendered with each background option. Scroll to compare; the snippet under each is the CSS to bake in.</p>
    <span class="lab-note">CSS options are zero-weight · image options are AI-generated candidates</span>
  </header>

  <main class="grid" id="grid"></main>

  <!-- Hero unit template (cloned into each stage) -->
  <template id="heroTpl">
    <div class="hero-unit">
      <div class="avatar"><img src="/images/profile/alex.jpg" alt="ビーガン王子" /></div>
      <h2 class="h-name">ビーガン王子</h2>
      <div class="h-alex">Alex Derycz</div>
      <p class="h-role">モデル・タレント・6カ国語MC・海外の架け橋</p>
      <p class="h-tag">「お笑いあり、涙あり、野菜あり」</p>
      <div class="h-social">
        <img src="/images/social/ig.png" alt="" /><img src="/images/social/yt.png" alt="" />
        <img src="/images/social/tt.png" alt="" /><img src="/images/social/x.png" alt="" />
        <img src="/images/social/li.png" alt="" /><img src="/images/social/line.png" alt="" />
      </div>
    </div>
  </template>

  <script>
    const VARIANTS = [
      { tag:'0', name:'Simple',          jp:'シンプル',        cls:'bg-simple',
        note:'Paper + faint crown watermark. Fastest, most content-first.',
        css:'/* no hero background — just the paper + crown watermark */' },
      { tag:'A', name:'Warm glow',       jp:'暖かいグロー',     cls:'bg-glow',
        note:'Soft gold → blush → sky halo behind the identity. Light & premium — my pick.',
        css:'background: radial-gradient(130% 78% at 50% -10%,\n  rgba(216,168,71,.40), rgba(248,200,210,.28) 30%,\n  rgba(181,213,232,.16) 50%, rgba(255,249,238,0) 74%);' },
      { tag:'B', name:'Watercolor wash', jp:'水彩ウォッシュ',   cls:'bg-wash',
        note:'Fresh sky-blue crown warming through gold into blush. More colour/energy.',
        css:'background: linear-gradient(180deg,\n  rgba(181,213,232,.62), rgba(216,168,71,.16) 40%,\n  rgba(248,200,210,.32) 62%, rgba(255,249,238,0) 96%);' },
      { tag:'C', name:'Gold sunrise',    jp:'ゴールドの朝日',   cls:'bg-sunrise',
        note:'Warmer, stronger gold bloom from the top. Regal, sunny.',
        css:'background: radial-gradient(120% 70% at 50% -8%,\n  rgba(216,168,71,.62), rgba(232,199,111,.34) 26%,\n  rgba(255,249,238,0) 66%);' },
      { tag:'D', name:'Royal spotlight', jp:'ロイヤル',         cls:'bg-royal',
        note:'Soft brand-red glow from the top — bold and on-brand.',
        css:'background: radial-gradient(115% 72% at 50% -6%,\n  rgba(201,34,58,.30), rgba(229,80,99,.16) 30%,\n  rgba(255,249,238,0) 64%);' },
      { tag:'E', name:'Sky & leaf',      jp:'空と葉',           cls:'bg-skyleaf',
        note:'Cool, fresh, plant-forward — sky blue into a hint of leaf green.',
        css:'background: linear-gradient(180deg,\n  rgba(181,213,232,.66), rgba(108,149,96,.20) 42%,\n  rgba(255,249,238,0) 92%);' },
      { tag:'F', name:'Blush dawn',      jp:'ブラッシュ',       cls:'bg-blush',
        note:'Gentle pink-peach bloom. Soft and friendly.',
        css:'background: radial-gradient(120% 75% at 50% -8%,\n  rgba(248,200,210,.55), rgba(232,199,111,.18) 38%,\n  rgba(255,249,238,0) 72%);' },
      { tag:'G', name:'Crown panel',     jp:'王冠パネル',       cls:'bg-crownpanel',
        note:'Denser gold crown pattern on a cream band — a decorative "hero panel".',
        css:'background: linear-gradient(180deg, #FDF1DA, #FFF9EE 78%);\n/* + tiled crown-pattern.svg mask @ gold, opacity .16 */' },
      { tag:'IMG 1', name:'Bespoke · Veggie confetti', jp:'生成：野菜', cls:'bg-img1',
        note:'AI-generated: cute vegetables/leaves around the edges, calm centre.',
        css:"background: url('/images/links-hero/cand1-veggie.jpg') center top / cover;" },
      { tag:'IMG 2', name:'Bespoke · Pastel sky',      jp:'生成：空',   cls:'bg-img2',
        note:'AI-generated: dreamy watercolor sky with soft clouds & sparkles.',
        css:"background: url('/images/links-hero/cand2-sky.jpg') center top / cover;" },
      { tag:'IMG 3', name:'Bespoke · Royal luxury',    jp:'生成：王室', cls:'bg-img3',
        note:'AI-generated: pale gold damask + soft crimson glow, Hermès-ish.',
        css:"background: url('/images/links-hero/cand3-royal.jpg') center top / cover;" },
    ];

    const grid = document.getElementById('grid');
    const tpl = document.getElementById('heroTpl');
    VARIANTS.forEach(v => {
      const card = document.createElement('section');
      card.className = 'variant';
      const head = document.createElement('div');
      head.className = 'variant-head';
      head.innerHTML = '<span class="v-tag">'+v.tag+'</span><span class="v-name">'+v.name+'</span>'+
                       '<span class="v-jp">'+v.jp+'</span><span class="v-note">'+v.note+'</span>';
      const stage = document.createElement('div');
      stage.className = 'hero-stage ' + v.cls;
      stage.appendChild(tpl.content.cloneNode(true));
      const snip = document.createElement('pre');
      snip.className = 'snippet';
      snip.textContent = v.css;
      card.appendChild(head);
      card.appendChild(stage);
      card.appendChild(snip);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
