  <style type="text/tailwindcss">
    /* Lead with a regular CSS rule before @theme — Tailwind v4 browser build
       is happiest with this (matches vegan-and-earth / fish-and-life). */
    .__seed { color: inherit; }

    @theme {
      --color-paper:       #FFF9EE;
      --color-paper-soft:  #FDF1DA;
      --color-paper-dim:   #F6E4BD;
      --color-ink:         #1F1812;
      --color-ink-soft:    #3C2E22;
      --color-muted:       #786148;
      --color-line:        #E9D9B5;

      --color-royal:       #C9223A;
      --color-royal-soft:  #E55063;
      --color-royal-deep:  #9C1428;
      --color-gold:        #D4A847;
      --color-gold-soft:   #E8C76F;
      --color-gold-deep:   #9C7E2A;
      --color-leaf:        #6C9560;
      --color-leaf-deep:   #3F6A3A;
      --color-leaf-soft:   #A3C49A;
      --color-blue:        #2B7AB0;
      --color-blue-deep:   #1B5C8B;
      --color-orange:      #C9532C;
      --color-orange-deep: #8E3A1B;
      --color-purple:      #6B4E8C;
      --color-purple-deep: #4B3666;
      --color-sky:         #B5D5E8;
      --color-blush:       #F8C8D2;

      --font-noto-sans-jp: "Noto Sans JP", sans-serif;
    }

    html, body { background: var(--color-paper); color: var(--color-ink); }
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .anim-bobble, .anim-drift, .anim-twinkle, .anim-pulse, .anim-float { animation: none !important; }
    }
    body {
      font-family: var(--font-noto-sans-jp);
      font-feature-settings: "palt";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .font-jp-display { font-family: var(--font-noto-sans-jp); font-weight: 900; }
    .font-jp         { font-family: var(--font-noto-sans-jp); }
    .display-tight   { letter-spacing: -0.035em; line-height: 0.94; }
    .display-italic  { font-family: var(--font-noto-sans-jp); font-weight: 700; font-style: italic; }

    /* ── Chibi-sticker V3 buttons ─────────────────────────────────────── */
    button, [class*="btn-"] {
      font-family: var(--font-noto-sans-jp) !important;
      font-weight: 700 !important;
    }
    .btn-base {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 24px;
      border-radius: 16px;
      border: 2.5px solid var(--color-ink);
      box-shadow: 4px 4px 0 var(--color-ink);
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      font-size: 15px; line-height: 1; white-space: nowrap; cursor: pointer;
    }
    .btn-base:hover  { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--color-ink); }
    .btn-base:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--color-ink); }
    .btn-lg { padding: 16px 34px; font-size: 17px; border-radius: 18px; }
    .btn-primary { background: var(--color-royal); color: var(--color-paper); }
    .btn-primary:hover { background: var(--color-royal-deep); }
    .btn-ghost   { background: var(--color-paper); color: var(--color-ink); }
    .btn-leaf    { background: var(--color-leaf); color: var(--color-paper); }
    .btn-leaf:hover { background: var(--color-leaf-deep); }
    .btn-gold    { background: var(--color-gold); color: var(--color-ink); }
    .btn-gold:hover { background: var(--color-gold-deep); color: var(--color-paper); }

    /* ── Furigana (ruby) — native, iOS-safe house style ───────────────── */
    ruby { ruby-position: over; -webkit-ruby-position: over; ruby-align: center; }
    rt {
      font-size: clamp(7px, 0.5em, 14px);
      font-weight: 400; line-height: 1; letter-spacing: 0.02em;
      opacity: 0.7; user-select: none; margin-bottom: -0.25em;
    }
    .heading-with-ruby { line-height: 1.3 !important; }

    /* ── Reveal-on-scroll (hero + end screen) ─────────────────────────── */
    .reveal {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.9s ease-out, transform 0.9s ease-out;
    }
    .reveal.is-visible { opacity: 1; transform: translateY(0); }
    .reveal[data-delay="1"] { transition-delay: 0.10s; }
    .reveal[data-delay="2"] { transition-delay: 0.22s; }
    .reveal[data-delay="3"] { transition-delay: 0.36s; }

    /* ── Character / ambient animations ───────────────────────────────── */
    @keyframes bobble { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-12px) rotate(1deg); } }
    .anim-bobble { animation: bobble 5s ease-in-out infinite; }
    @keyframes drift { 0%,100% { transform: translate(0,0); } 50% { transform: translate(8px,-10px); } }
    .anim-drift { animation: drift 8s ease-in-out infinite; }
    @keyframes twinkle { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .anim-twinkle { animation: twinkle 4s ease-in-out infinite; }
    @keyframes pulse-soft { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .anim-pulse { animation: pulse-soft 2.4s ease-in-out infinite; }
    @keyframes float-soft { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    .anim-float { animation: float-soft 6s ease-in-out infinite; }
    /* Pop-in for reaction Oji + reveal box. */
    @keyframes ojiPop { 0% { opacity: 0; transform: scale(0.6) translateY(8px); } 60% { opacity: 1; transform: scale(1.08) translateY(0); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    .oji-pop { animation: ojiPop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes revealRise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    .reveal-rise { animation: revealRise 0.5s ease-out both; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

    /* ── Big counter ticker ───────────────────────────────────────────── */
    .ticker { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .big-number { font-weight: 900; letter-spacing: -0.04em; line-height: 0.95; }

    /* ── Sticker cards ────────────────────────────────────────────────── */
    .sticker { background: var(--color-paper); border: 2.5px solid var(--color-ink); border-radius: 20px; box-shadow: 6px 6px 0 var(--color-ink); }
    .sticker-soft { background: var(--color-paper); border: 2px solid var(--color-ink); border-radius: 18px; box-shadow: 4px 4px 0 var(--color-ink); }

    /* ── Inline source link ───────────────────────────────────────────── */
    .src { color: var(--color-muted); text-decoration: none; font-size: 0.62em; vertical-align: super; line-height: 0; padding: 0 2px; border-bottom: 1px dotted var(--color-muted); }
    .src:hover { color: var(--color-ink); }

    /* ════════════════════════════════════════════════════════════════════
       QUIZ-SPECIFIC COMPONENTS
       ════════════════════════════════════════════════════════════════════ */

    /* App-style screens — only one visible at a time. */
    .screen { display: none; }
    .screen.is-on { display: block; }

    /* The quiz stage takes a per-question --accent; ocean Qs flip dark. */
    #screen-quiz {
      min-height: 100svh;
      padding: 16px 20px 120px;
      background: var(--color-paper);
    }
    @media (min-width: 640px) { #screen-quiz { padding: 22px 24px 128px; } }
    /* Frosted content panel that floats over the storybook scene */
    .q-panel { background: rgba(255,249,238,0.5); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); border: 2.5px solid var(--color-ink); border-radius: 24px; box-shadow: 6px 6px 0 var(--color-ink); padding: 20px 16px; }
    @media (min-width: 640px) { .q-panel { padding: 26px 24px; } }
    /* Ocean immersive mode (Q8 / Q9) — borrows the fish-and-life palette. */
    #screen-quiz.ocean {
      color: var(--color-paper);
      background:
        radial-gradient(ellipse at 50% 0%, rgba(26,91,133,0.55), transparent 60%),
        radial-gradient(ellipse at 0% 100%, rgba(11,53,83,0.65), transparent 60%),
        linear-gradient(180deg, #062338 0%, #031826 55%, #020c14 100%);
    }

    /* Top progress bar — tints to the active question's accent. */
    .q-progress { position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 60; background: rgba(31,24,18,0.07); }
    .ocean .q-progress, #screen-quiz.ocean ~ .q-progress { background: rgba(255,249,238,0.10); }
    .q-progress__bar { height: 100%; width: 0%; background: var(--accent, #C9223A); transition: width 0.5s cubic-bezier(.22,1,.36,1), background 0.5s ease; }

    /* Progress meta row: Qn / 10 + dots */
    .q-dots { display: inline-flex; gap: 6px; }
    .q-dot { width: 8px; height: 8px; border-radius: 999px; background: rgba(31,24,18,0.16); border: 1.5px solid rgba(31,24,18,0.3); transition: background 0.3s, transform 0.3s, border-color 0.3s; }
    .q-dot.is-active { background: var(--accent, #C9223A); border-color: var(--accent, #C9223A); transform: scale(1.3); }
    .q-dot.is-done { background: var(--color-leaf-deep); border-color: var(--color-leaf-deep); }
    .ocean .q-dot { background: rgba(255,249,238,0.18); border-color: rgba(255,249,238,0.35); }
    .ocean .q-dot.is-active { background: var(--color-gold-soft); border-color: var(--color-gold-soft); }
    .ocean .q-dot.is-done { background: var(--color-gold); border-color: var(--color-gold); }
    /* Counter label flips light on the dark ocean questions. */
    .q-meta-label { color: rgba(31,24,18,0.72); }
    .q-meta-sep   { color: rgba(31,24,18,0.4); }
    .ocean .q-meta-label { color: rgba(255,249,238,0.92); }
    .ocean .q-meta-sep   { color: rgba(255,249,238,0.5); }

    /* Question badge (Q1…Q10) */
    .q-badge {
      display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;
      min-width: 56px; height: 34px; padding: 0 12px;
      border-radius: 11px; border: 2.5px solid var(--color-ink); box-shadow: 3px 3px 0 var(--color-ink);
      background: var(--accent, #C9223A); color: var(--color-paper);
      font-weight: 900; font-size: 15px; line-height: 1; letter-spacing: 0.02em;
    }
    .ocean .q-badge { border-color: #010912; box-shadow: 3px 3px 0 #010912; }
    /* progress: colored Q-number + thick percentage bar */
    .q-num { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; min-width:56px; height:36px; padding:0 14px; border-radius:11px; border:2.5px solid var(--color-ink); box-shadow:3px 3px 0 var(--color-ink); background:var(--accent,#C9223A); color:#fff; font-weight:900; font-size:16px; line-height:1; }
    .q-prog { flex:1; height:32px; border-radius:999px; border:2.5px solid var(--color-ink); background:var(--color-paper-soft); box-shadow:3px 3px 0 var(--color-ink); overflow:hidden; }
    .q-prog__fill { height:100%; width:0%; background:var(--accent,#C9223A); border-radius:999px; transition:width 0.6s cubic-bezier(.22,1,.36,1), background 0.4s ease; }
    .q-prog__pct { color:#fff; font-weight:900; font-size:13px; line-height:1; padding-right:11px; white-space:nowrap; }
    .ocean .q-num { border-color:#010912; box-shadow:3px 3px 0 #010912; }
    .ocean .q-prog { border-color:#010912; box-shadow:3px 3px 0 #010912; background:#0b3553; }

    /* Speech bubble — Oji "asks" the question. Tail points left toward Oji. */
    .bubble {
      position: relative;
      background: var(--color-paper);
      border: 2.5px solid var(--color-ink);
      border-radius: 18px;
      box-shadow: 5px 5px 0 var(--color-ink);
      padding: 16px 18px;
    }
    .bubble::before, .bubble::after {
      content: ""; position: absolute; left: -14px; top: 26px; width: 0; height: 0;
      border-style: solid; border-width: 9px 14px 9px 0;
    }
    .bubble::before { border-color: transparent var(--color-ink) transparent transparent; }
    .bubble::after  { left: -10px; border-color: transparent var(--color-paper) transparent transparent; }
    @media (min-width: 640px) { .bubble { padding: 20px 24px; } }
    .ocean .bubble { background: #062338; border-color: #0b3553; box-shadow: 5px 5px 0 #010912; }
    .ocean .bubble::before { border-color: transparent #0b3553 transparent transparent; }
    .ocean .bubble::after  { border-color: transparent #062338 transparent transparent; }

    /* Answer chips — PLAIN text, no furigana. */
    .choices { display: grid; gap: 10px; }
    .choices.cols-2 { grid-template-columns: 1fr 1fr; }
    @media (max-width: 359px) { .choices.cols-2 { grid-template-columns: 1fr; } }
    .choice {
      width: 100%; text-align: center;
      padding: 15px 14px;
      background: var(--color-paper-soft);
      border: 2.5px solid var(--color-ink);
      border-radius: 14px;
      box-shadow: 3px 3px 0 var(--color-ink);
      font-family: var(--font-noto-sans-jp); font-weight: 700; font-size: 16px; line-height: 1.4;
      color: var(--color-ink);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
    }
    .choice:hover { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--color-ink); }
    .choice:disabled { cursor: default; }
    .choice:disabled:hover { transform: none; box-shadow: 3px 3px 0 var(--color-ink); }
    .choice[data-state="correct"] { background: #DCEFD8; color: var(--color-leaf-deep); border-color: var(--color-leaf-deep); box-shadow: 3px 3px 0 var(--color-leaf-deep); }
    .choice[data-state="wrong"]   { background: #F8DCDC; color: var(--color-royal-deep); border-color: var(--color-royal-deep); box-shadow: 3px 3px 0 var(--color-royal-deep); animation: shake 0.4s; }
    .choice[data-state="missed"]  { background: #DCEFD8; color: var(--color-leaf-deep); border-color: var(--color-leaf-deep); border-style: dashed; box-shadow: none; }
    .choice[data-state="dim"]     { opacity: 0.5; }
    /* Ocean chips */
    .ocean .choice { background: #0b3553; color: var(--color-paper); border-color: #1a5b85; box-shadow: 3px 3px 0 #010912; }
    .ocean .choice:hover { box-shadow: 1px 1px 0 #010912; }
    .ocean .choice:disabled:hover { box-shadow: 3px 3px 0 #010912; }
    .ocean .choice[data-state="correct"] { background: #14503a; color: #B7F0C8; border-color: #5fbf86; box-shadow: 3px 3px 0 #010912; }
    .ocean .choice[data-state="wrong"]   { background: #5a1f2a; color: #FFC2CC; border-color: #C9223A; box-shadow: 3px 3px 0 #010912; }
    .ocean .choice[data-state="missed"]  { background: transparent; color: #B7F0C8; border-color: #5fbf86; border-style: dashed; box-shadow: none; }
    @media (prefers-reduced-motion: reduce) { .choice[data-state="wrong"] { animation: none; } }

    /* Result tag pill (せいかい！/ ざんねん…) */
    .result-tag { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 999px; border: 2px solid var(--color-ink); font-weight: 900; font-size: 14px; letter-spacing: 0.06em; }
    .result-tag.ok { background: var(--color-leaf-deep); color: var(--color-paper); }
    .result-tag.ng { background: var(--color-royal); color: var(--color-paper); }

    /* Reveal box — tinted to the question accent. */
    .reveal-box {
      border: 2.5px solid var(--color-ink);
      border-radius: 18px;
      box-shadow: 5px 5px 0 var(--color-ink);
      padding: 22px 18px;
      background: var(--color-paper);
    }
    @media (min-width: 640px) { .reveal-box { padding: 28px 26px; } }
    .ocean .reveal-box { border-color: #0b3553; box-shadow: 5px 5px 0 #010912; background: rgba(6,35,56,0.92); }

    /* Floating motif icons behind the card. */
    .motif { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
    .motif img { position: absolute; opacity: 0.16; }
    .ocean .motif img { opacity: 0.22; }

    /* Persistent poop ticker — fixed bottom strip, appears on START. */
    .poop-bar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 55;
      transform: translateY(110%);
      transition: transform 0.5s cubic-bezier(.22,1,.36,1);
      pointer-events: none;
      display: flex; justify-content: center;
      padding: 0 10px 8px;
    }
    .poop-bar.is-on { transform: translateY(0); }
    .poop-bar__inner {
      max-width: 640px; width: 100%;
      background: rgba(255,249,238,0.96);

  <script>
    (function () {
      'use strict';
      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const $ = (id) => document.getElementById(id);

      // ───────── number helpers (ported from vegan-and-earth) ─────────
      const formatN = (n) => {
        if (n >= 1000) return Math.round(n).toLocaleString('ja-JP');
        return Math.round(n).toString();
      };
      function animateCounter(el) {
        if (el.dataset.counted === '1') return;
        el.dataset.counted = '1';
        const target = parseFloat(el.dataset.countTarget);
        const suffix = el.dataset.countSuffix || '';
        const start = performance.now();
        const duration = prefersReduced ? 1 : Math.min(1800, 600 + Math.log10(target + 1) * 380);
        const tick = (now) => {
          const t = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - t, 3);
          el.textContent = formatN(target * eased) + suffix;
          if (t < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }

      // ───────── hero / end reveal-on-scroll ─────────
      function runReveals(scope) {
        const els = scope.querySelectorAll('.reveal');
        els.forEach(el => requestAnimationFrame(() => el.classList.add('is-visible')));

      runReveals($('screen-hero'));

      // ═══════════════════════════════════════════════════════════════════

      //  Choices are PLAIN (no furigana). Reading content carries native ruby.
      //  Numbers come ONLY from the brief; nothing invented.
      // ═══════════════════════════════════════════════════════════════════
      const IMG = '/images/vegan-to-chikyu/';
      const OJI = '/images/oji/';
      function motif(items) {
        return '<div class="motif" aria-hidden="true">' + items.map(it =>
          '<img src="' + IMG + it.src + '.png" style="' + it.style + '" class="' + (it.cls || 'anim-drift') + '"/>'
        ).join('') + '</div>';
      }

      const QUESTIONS = [
        // ───────────────────────────── Q1 · methane ──────────────────────
        {
          accent: '#C9223A', poseAsk: 'oji_curious', poseReveal: 'oji_surprised',
          motif: motif([
            { src: 'icon-co2-cloud', style: 'width:120px; top:-10px; right:-20px;' },
            { src: 'icon-cow-burp', style: 'width:96px; bottom:-14px; left:-18px;', cls: 'anim-float' },

          q: '<ruby>牛<rt>うし</rt></ruby>のゲップに<ruby>含<rt>ふく</rt></ruby>まれるメタン。<ruby>温室<rt>おんしつ</rt></ruby><ruby>効果<rt>こうか</rt></ruby>はCO₂の<ruby>約<rt>やく</rt></ruby><ruby>何<rt>なん</rt>倍<rt>ばい</rt></ruby>？',
          choices: ['約2倍', '約28倍', '約100倍', '同じ'], correct: 1,
          reveal:
            '<div class="flex items-center justify-center gap-4">' +
              '<img src="' + IMG + 'icon-cow-burp.png" alt="" class="w-14 h-14 sm:w-16 sm:h-16"/>' +
              '<div class="leading-none"><span class="font-jp-display text-[22px] text-ink/65"><ruby>約<rt>やく</rt></ruby></span> ' +
              '<span class="big-number ticker text-[64px] sm:text-[88px]" data-count-target="28" style="color:#C9223A;">0</span>' +
              '<span class="font-jp-display text-[30px] text-ink"><ruby>倍<rt>ばい</rt></ruby></span></div>' +
            '</div>' +
            '<p class="mt-4 font-jp text-ink-soft text-[15px] sm:text-[16px] leading-[1.85] text-center">' +
              'メタンはCO₂の<ruby>約<rt>やく</rt></ruby>28<ruby>倍<rt>ばい</rt></ruby>。<br class="sm:hidden"/><ruby>牛<rt>うし</rt></ruby>のゲップ、あなどれないんだ。</p>',
        },
        // ───────────────────────────── Q2 · water ────────────────────────
        {
          accent: '#2B7AB0', poseAsk: 'oji_questioning', poseReveal: 'oji_shocked',
          motif: motif([
            { src: 'icon-water-drop', style: 'width:64px; top:-6px; right:6%;' },
            { src: 'icon-water-drop', style: 'width:42px; top:36%; right:-12px;', cls: 'anim-float' },
            { src: 'icon-shower', style: 'width:104px; bottom:-16px; left:-16px;', cls: 'anim-float' },
            { src: 'food-hamburger', style: 'width:72px; top:6%; left:-10px;', cls: 'anim-twinkle' },
          ]),
          q: 'ハンバーガー1<ruby>個<rt>こ</rt></ruby>を<ruby>作<rt>つく</rt></ruby>るのに<ruby>必要<rt>ひつよう</rt></ruby>なお<ruby>水<rt>みず</rt></ruby>は？',
          choices: ['約3L', '約30L', '約300L', '約3,000L'], correct: 3,
          reveal:
            '<div class="flex items-center justify-center gap-4">' +
              '<img src="' + IMG + 'icon-water-drop.png" alt="" class="w-14 h-14 sm:w-16 sm:h-16"/>' +
              '<div class="leading-none"><span class="font-jp-display text-[22px] text-ink/65"><ruby>約<rt>やく</rt></ruby></span> ' +

              '<span class="font-jp-display text-[30px] text-ink">L</span></div>' +

          '<div class="q-panel reveal-rise">' +
            '<div class="flex items-start gap-3 sm:gap-4">' +
              '<img id="q-oji" src="' + OJI + qd.poseAsk + '.png" alt="ビーガン王子" class="w-20 sm:w-28 shrink-0 anim-bobble drop-shadow-[0_8px_18px_rgba(31,24,18,0.18)]"/>' +
              '<div class="bubble flex-1 mt-2">' +
                '<h2 id="q-bubble-text" class="font-jp-display text-[18px] sm:text-[22px] leading-[1.65] text-ink" style="transition:opacity 0.25s ease;">' + qd.q + '</h2>' +
              '</div>' +
            '</div>' +
            '<div class="choices ' + colClass + ' mt-6" id="q-choices">' +
              qd.choices.map((c, k) => '<button type="button" class="choice" data-i="' + k + '">' + c + '</button>').join('') +
            '</div>' +
            '<div id="q-reveal" class="mt-6" style="display:none;"></div>' +
          '</div>';

        // bind choice clicks
        qCard.querySelectorAll('.choice').forEach(btn => {
          btn.addEventListener('click', () => answer(parseInt(btn.dataset.i, 10)), { once: false });
        });

        qNextWrap.style.display = 'none';
        qNextLabel.textContent = (i === N - 1) ? 'けっかを見る' : 'つぎへ';
        window.scrollTo({ top: 0, behavior: 'auto' });
      }

      // ───────── handle an answer (locks, scores, reveals) ─────────
      function answer(chosen) {
        if (answers[idx] !== null) return;     // already answered
        const qd = QUESTIONS[idx];
        answers[idx] = chosen;
        const isCorrect = chosen === qd.correct;

        // mark chips
        const chips = qCard.querySelectorAll('.choice');
        chips.forEach((chip, k) => {
          chip.disabled = true;
          if (k === qd.correct) chip.dataset.state = (k === chosen) ? 'correct' : 'missed';
          else if (k === chosen) chip.dataset.state = 'wrong';
          else chip.dataset.state = 'dim';
        });

        // Oji reacts (pose change + pop)
        const oji = $('q-oji');
        if (oji) { oji.src = OJI + qd.poseReveal + '.png'; oji.classList.remove('anim-bobble'); oji.classList.add('oji-pop'); }

        // the question text fades out and is replaced by the せいかい/ざんねん word-art
        const qt = $('q-bubble-text');
        if (qt) {
          qt.style.opacity = '0';
          setTimeout(() => {
            qt.innerHTML = '<img src="/images/quiz-bg/' + (isCorrect ? 'seikai' : 'zannen') + '.png" alt="' + (isCorrect ? 'せいかい' : 'ざんねん') + '" class="' + (isCorrect ? 'h-14 sm:h-16' : 'h-[4.2rem] sm:h-[4.7rem]') + ' w-auto block mx-auto"/>';
            qt.style.opacity = '1';
          }, 250);
        }
        // inject reveal — count-up + explanation only (no result tag/icon)
        const box = $('q-reveal');
        box.innerHTML = '<div class="reveal-box reveal-rise">' + qd.reveal + '</div>';
        box.style.display = '';

        // count-ups inside reveal
        box.querySelectorAll('[data-count-target]').forEach(el => { el.dataset.counted = '0'; animateCounter(el); });
        // live counters
        if (qd.live === 'poop') startQ3();
        if (qd.live === 'forest') startQ4();

        // show next
        qNextWrap.style.display = 'flex';
        requestAnimationFrame(() => box.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
      }

      // ───────── next / finish ─────────
      qNext.addEventListener('click', () => {
        stopLiveCounters();
        if (idx < N - 1) showQuestion(idx + 1);
        else showEnd();
      });

      // ───────── start ─────────
      function startQuiz() {
        screenHero.classList.remove('is-on');
        screenEnd.classList.remove('is-on');
        screenQuiz.classList.add('is-on');
        showQuestion(0);
      }
      $('start-btn').addEventListener('click', startQuiz);

      // ───────── grading ─────────
      function gradeFor(score) {
        if (score === 10) return { pose: 'oji_excited', msg: 'ぜんぶ<ruby>正解<rt>せいかい</rt></ruby>！もう<ruby>地球<rt>ちきゅう</rt></ruby>はかせだね！' };
        if (score >= 7)  return { pose: 'oji_happy', msg: 'あっぱれ！ほとんど<ruby>正解<rt>せいかい</rt></ruby>だね。' };
        if (score >= 4)  return { pose: 'oji_curious', msg: 'いいかんじ！<ruby>半分<rt>はんぶん</rt></ruby>こえたよ。' };
        if (score >= 1)  return { pose: 'oji_wondering', msg: 'ナイス<ruby>挑戦<rt>ちょうせん</rt></ruby>！ここからが<ruby>面白<rt>おもしろ</rt></ruby>いよ。' };
        return { pose: 'oji_questioning', msg: 'ドンマイ！<ruby>一緒<rt>いっしょ</rt></ruby>に<ruby>知<rt>し</rt></ruby>っていこう。' };
      }

      const pageUrl = window.location.href.split('#')[0];
      function shareText(score) { return '「しらなかった！ごはんと地球のクイズ」' + score + '/10 だった！ きみは何問わかる？'; }

      function showEnd() {
        stopLiveCounters();
        const score = answers.reduce((a, p, i) => a + (p === QUESTIONS[i].correct ? 1 : 0), 0);
        const g = gradeFor(score);
        $('end-oji').src = OJI + g.pose + '.png';
        $('end-msg').innerHTML = g.msg +
          '<span class="block mt-2 text-[13.5px] sm:text-[14.5px] font-jp font-medium text-ink-soft">' +
          '<ruby>結果<rt>けっか</rt></ruby>をシェアして、<ruby>友達<rt>ともだち</rt></ruby>にも<ruby>挑戦<rt>ちょうせん</rt></ruby>してもらおう！</span>';
        $('end-marks').innerHTML = answers.map((p, i) => '<img src="' + IMG + (p === QUESTIONS[i].correct ? 'icon-check-social' : 'icon-x-social') + '.png" alt="" class="w-full h-auto"/>').join('');

        // recap: flip cards — front = full question; tap (horizontal flip) →
        // きみの答え + 正解 + くわしく見る. Questions stripped of furigana.
        const strip = (s) => s.replace(/<rt>.*?<\/rt>/g, '').replace(/<\/?ruby>/g, '');
        const ARROW = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7 L11 7 M7 3 L11 7 L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>';
        $('recap-list').innerHTML = RECAP.map((r, i) => {
          const Q = QUESTIONS[i];
          const got = answers[i] === Q.correct;
          const chosen = answers[i] !== null ? Q.choices[answers[i]] : '—';
          const correct = Q.choices[Q.correct];
          const front = '<div class="rc-front">' +
              '<img class="rc-ic anim-pulse" src="' + IMG + (got ? 'icon-check-social' : 'icon-x-social') + '.png" alt="' + (got ? '正解' : '不正解') + '"/>' +
              '<p class="rc-q">' + strip(Q.q) + '</p></div>';
          const youLine = got ? '' : '<div class="rc-line"><span class="rc-label">きみの答え</span><span class="rc-you">' + chosen + '</span></div>';
          const back = '<div class="rc-back" style="display:none">' +
              '<div class="rc-ans">' + youLine +
                '<div class="rc-line"><span class="rc-label">正解</span><span class="rc-ok">' + correct + '</span></div></div>' +
              '<a class="rc-more" href="' + r.href + '" onclick="event.stopPropagation()">くわしく見る ' + ARROW + '</a></div>';
          return '<div class="rc-row"><div class="rc-qnum">Q' + (i + 1) + '</div>' +
              '<div class="rc-wrap"><div class="rc-card ' + (got ? 'ok' : 'ng') + '" data-rc>' + front + back + '</div></div></div>';
        }).join('');
        // flip on tap (horizontal axis); ONE card open at a time; height locked to avoid page jump
        const rcCards = $('recap-list').querySelectorAll('[data-rc]');
        function rcFlip(card, toBack) {
          const f = card.querySelector('.rc-front'), b = card.querySelector('.rc-back');
          if ((f.style.display === 'none') === toBack) return;       // already in that state
          if (!card.style.minHeight) card.style.minHeight = card.offsetHeight + 'px'; // lock front height
          card.style.transform = 'rotateX(90deg)';
          setTimeout(() => {
            f.style.display = toBack ? 'none' : '';
            b.style.display = toBack ? '' : 'none';
            card.style.transform = 'rotateX(0deg)';
          }, 210);
        }
        rcCards.forEach(card => {
          card.addEventListener('click', () => {
            const isBack = card.querySelector('.rc-front').style.display === 'none';
            if (isBack) { rcFlip(card, false); return; }
            rcCards.forEach(c => { if (c !== card && c.querySelector('.rc-front').style.display === 'none') rcFlip(c, false); });
            rcFlip(card, true);
          });
        });

        // share links + pre-warm the 認定証 card PNG (so button taps stay inside the user gesture)
        buildCardBlob(score);
        const txt = shareText(score);
        $('share-x').href = 'https://x.com/intent/tweet?text=' + encodeURIComponent(txt) + '&url=' + encodeURIComponent(pageUrl);
        $('share-line').href = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(pageUrl) + '&text=' + encodeURIComponent(txt);

        // swap screens
        screenQuiz.classList.remove('is-on');
        screenHero.classList.remove('is-on');
        screenEnd.classList.add('is-on');
        $('q-progress').style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'auto' });

        // count up the score
        const sEl = $('end-score');
        sEl.dataset.countTarget = String(score); sEl.dataset.counted = '0';
        if (score === 0) sEl.textContent = '0'; else animateCounter(sEl);
        runReveals(screenEnd);
      }

      // ───────── share card (認定証 → 1080×1920 PNG) ─────────
      let cardBlob = null, cardScore = -1, cardBusy = null;
      function buildCardBlob(score) {
        if (cardBlob && cardScore === score) return Promise.resolve(cardBlob);
        if (cardBusy) return cardBusy;
        if (!window.html2canvas) return Promise.resolve(null);
        $('sc-num').textContent = score;
        const d = new Date();
        $('sc-date').textContent = d.getFullYear() + '.' + (d.getMonth() + 1) + '.' + d.getDate();
        cardBusy = document.fonts.ready
          .then(() => html2canvas($('sc-card'), { width: 1080, height: 1920, scale: 1, useCORS: true, backgroundColor: null }))
          .then(canvas => new Promise(res => canvas.toBlob(res, 'image/png')))
          .then(b => { cardBlob = b; cardScore = score; cardBusy = null; return b; })
          .catch(() => { cardBusy = null; return null; });
        return cardBusy;
      }
      function downloadCard(score) {
        if (!cardBlob) return false;
        const a = document.createElement('a');
        a.download = 'gohan-quiz-' + score + 'of10.png';
        a.href = URL.createObjectURL(cardBlob);
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(a.href), 4000);
        return true;
      }
      function copyLink() { try { return (navigator.clipboard ? navigator.clipboard.writeText(pageUrl) : Promise.resolve()).catch(() => {}); } catch (_) { return Promise.resolve(); } }
      const endScore = () => answers.reduce((a, p, i) => a + (p === QUESTIONS[i].correct ? 1 : 0), 0);

      // ───────── share buttons ─────────
      function toast(msg) { const t = $('share-toast'); t.textContent = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2600); }
      // 結果をシェア — mobile: link → clipboard + card PNG into the OS share sheet;
      // desktop: always SAVE the PNG + copy the link (desktop share sheets are flaky).
      $('share-native').addEventListener('click', async () => {
        const score = endScore();
        const txt = shareText(score);
        copyLink();
        const mobile = window.matchMedia('(hover: none), (pointer: coarse)').matches;
        if (!mobile) {
          if (cardBlob && cardScore === score) {          // pre-warmed → save synchronously, in-gesture
            toast(downloadCard(score) ? '画像を保存して、リンクをコピーしたよ！' : 'リンクをコピーしたよ！');
            return;
          }
          const b = await buildCardBlob(score);
          toast(b && downloadCard(score) ? '画像を保存して、リンクをコピーしたよ！' : 'リンクをコピーしたよ！');
          return;
        }
        const blob = await buildCardBlob(score);
        if (blob && navigator.canShare) {
          const file = new File([blob], 'gohan-quiz-' + score + 'of10.png', { type: 'image/png' });
          if (navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], text: txt + ' ' + pageUrl }); toast('リンクもコピーしたよ！'); return; }
            catch (e) { if (e && e.name === 'AbortError') return; }
          }
        }
        if (navigator.share) {
          try { await navigator.share({ title: 'ごはんと地球のクイズ', text: txt, url: pageUrl }); return; }
          catch (e) { if (e && e.name === 'AbortError') return; }
        }
        toast(downloadCard(score) ? '画像を保存して、リンクをコピーしたよ！' : 'リンクをコピーしたよ！');
      });
      // X / LINE: the intent opens via the link itself; alongside it we save the
      // card image + copy the page link so it's easy to attach & paste.
      // Synchronous fast-path when pre-warmed — late downloads get blocked as drive-by.
      ['share-x', 'share-line'].forEach(id => $(id).addEventListener('click', () => {
        const score = endScore();
        copyLink();
        if (cardBlob && cardScore === score) {
          toast(downloadCard(score) ? '画像を保存＆リンクをコピーしたよ！' : 'リンクをコピーしたよ！');
          return;
        }
        buildCardBlob(score).then(b => {
          toast(b && downloadCard(score) ? '画像を保存＆リンクをコピーしたよ！' : 'リンクをコピーしたよ！');
        });
      }));

      // ───────── retry ─────────
      $('retry-btn').addEventListener('click', () => {
        for (let i = 0; i < N; i++) answers[i] = null;
        idx = 0;
        screenEnd.classList.remove('is-on');
        screenQuiz.classList.add('is-on');
        showQuestion(0);
      });
    })();
  </script>
  <script src="/mnav.js" defer></script>
  <script src="/oji-footer.js" defer></script>
  <script>(function(){var btn=document.getElementById('furigana-toggle');if(!btn)return;var root=document.documentElement;function sync(){btn.setAttribute('aria-checked',root.classList.contains('furigana-on')?'true':'false');}sync();btn.addEventListener('click',function(){var on=!root.classList.contains('furigana-on');root.classList.toggle('furigana-on',on);root.classList.toggle('furigana-off',!on);try{localStorage.setItem('furigana',on?'on':'off');}catch(e){}sync();});})();</script>
</body>
</html>
